<style>
:root{
  --bg:#0a0a1a;--bg2:#111128;--panel:#1a1a3a;--border:#3a3a6a;
  --gold:#f0c040;--green:#40c080;--red:#e04040;--blue:#4080f0;
  --purple:#a040f0;--gray:#606080;--white:#e0e0f0;--dim:#404060;--orange:#f08040
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);color:var(--white);font-family:'Nunito',sans-serif;overflow:hidden}
.px{font-family:'Press Start 2P',monospace}

/* ── Layout ── */
#app{height:100dvh;display:flex;flex-direction:column;max-width:480px;margin:0 auto}
.screen{flex:1;overflow-y:auto;padding:0 0 68px;animation:fadein .2s ease}
@keyframes fadein{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}

/* ── Loading ── */
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100dvh;gap:16px}
.loading-title{font-family:'Press Start 2P';font-size:14px;color:var(--gold)}
.loading-sub{font-size:12px;color:var(--gray)}

/* ── Game header (timer only) ── */
.ghdr{padding:8px 14px;background:var(--bg2);border-bottom:2px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;min-height:44px}
.ghdr-timer{font-family:'Press Start 2P';font-size:14px;color:var(--gold)}
.ghdr-timer.warn{color:var(--red);animation:blink 1s infinite}
.ghdr-right{display:flex;align-items:center;gap:8px}

/* ── Nav ── */
.nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;height:60px;background:var(--bg2);border-top:2px solid var(--border);display:flex;z-index:100}
.nb{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;font-size:9px;color:var(--gray);cursor:pointer;border:none;background:none;padding:4px;transition:color .15s}
.nb.active{color:var(--gold)}
.ni{font-size:22px}

/* ── HERO SCREEN ── */
.hero-screen{padding:12px 14px 0;display:flex;flex-direction:column;align-items:center}

/* Zone chip */
.zone-chip{display:flex;align-items:center;justify-content:space-between;width:100%;background:var(--panel);border:1px solid var(--border);border-radius:20px;padding:7px 12px 7px 14px;margin-bottom:14px;cursor:pointer;transition:border-color .15s}
.zone-chip:active{border-color:var(--gold)}
.zone-name{font-size:13px;font-weight:700}
.zone-chip-btn{font-size:11px;color:var(--gold);font-weight:800;white-space:nowrap}

/* Sprite wrapper + animations */
.hero-sprite-wrap{position:relative;margin-bottom:10px;cursor:pointer}
.hero-sprite-wrap::after{content:'TAP';position:absolute;bottom:-6px;left:50%;transform:translateX(-50%);font-family:'Press Start 2P';font-size:6px;color:var(--gold);opacity:.5;letter-spacing:2px}
.hero-sprite{image-rendering:pixelated;object-fit:contain;display:block}
.hero-sprite.s0{animation:float 3.5s ease-in-out infinite}
.hero-sprite.s1{animation:float 3s ease-in-out infinite,glow1 3s ease-in-out infinite}
.hero-sprite.s2{animation:float 2.5s ease-in-out infinite,glow2 2.5s ease-in-out infinite}
.hero-sprite.s3{animation:float 2s ease-in-out infinite,glow3 2s ease-in-out infinite}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
@keyframes glow1{0%,100%{filter:drop-shadow(0 4px 8px rgba(64,128,240,.4))}50%{filter:drop-shadow(0 4px 16px rgba(64,128,240,.8))}}
@keyframes glow2{0%,100%{filter:drop-shadow(0 4px 10px rgba(160,64,240,.5))}50%{filter:drop-shadow(0 4px 20px rgba(160,64,240,.9))}}
@keyframes glow3{0%,100%{filter:drop-shadow(0 4px 12px rgba(240,192,64,.6))}50%{filter:drop-shadow(0 6px 24px rgba(240,192,64,1))}}
@keyframes levelup{0%{transform:scale(1) translateY(0);filter:brightness(1)}25%{transform:scale(1.4) translateY(-20px);filter:brightness(3) drop-shadow(0 0 24px #ffe066)}50%{transform:scale(1.2) translateY(-10px);filter:brightness(2) drop-shadow(0 0 16px #a040f0)}75%{transform:scale(1.3) translateY(-15px);filter:brightness(2.5) drop-shadow(0 0 20px #ffe066)}100%{transform:scale(1) translateY(0);filter:brightness(1)}}
.hero-sprite.levelup-anim{animation:levelup 1.2s ease-in-out forwards!important}

/* Character info */
.hero-name{font-family:'Press Start 2P';font-size:10px;color:var(--gold);text-align:center;margin-bottom:4px}
.hero-title{font-size:12px;color:var(--gray);text-align:center;margin-bottom:10px}
.xp-bar{background:var(--dim);height:8px;border-radius:4px;overflow:hidden;margin:6px 0}
.xp-fill{height:100%;transition:width .6s ease;border-radius:4px}
.xp-label{font-size:10px;color:var(--gray);text-align:center;margin-bottom:14px}
/* QR Scanner */
.qr-wrap{position:relative;background:#000;border-radius:10px;overflow:hidden;width:100%;aspect-ratio:1;max-width:280px;margin:0 auto}
.qr-wrap video{width:100%;height:100%;object-fit:cover;display:block}
.qr-finder{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none}
.qr-finder-box{width:55%;aspect-ratio:1;border:2.5px solid var(--gold);border-radius:10px;box-shadow:0 0 0 9999px rgba(0,0,0,.45)}
@keyframes scan-line{0%{top:10%}100%{top:90%}}
.qr-scan-line{position:absolute;left:22%;right:22%;height:2px;background:var(--gold);opacity:.7;animation:scan-line 1.5s ease-in-out infinite alternate}

/* Action buttons */
.hero-actions{width:100%;margin-top:4px}
.action-row{display:flex;gap:8px;margin-bottom:8px}
.action-btn{flex:1;background:var(--panel);border:2px solid var(--border);border-radius:8px;padding:10px 6px;text-align:center;cursor:pointer;transition:border-color .15s,transform .1s}
.action-btn:active{transform:scale(.95)}
.action-btn.available{border-color:var(--border)}
.action-btn.available:active{border-color:var(--gold)}
.action-btn.disabled{opacity:.35;cursor:not-allowed}
.action-btn.highlight{border-color:var(--gold);background:rgba(240,192,64,.08)}
.action-icon{font-size:22px;margin-bottom:4px}
.action-label{font-size:10px;font-weight:700;color:var(--white)}
.action-sub{font-size:9px;color:var(--gray);margin-top:2px}

/* Zone presence */
.zone-players{width:100%;margin-top:4px;padding:10px 12px;background:var(--bg2);border:1px solid var(--border);border-radius:8px}
.zone-players-title{font-size:10px;color:var(--gray);margin-bottom:6px}
.zone-player-row{display:flex;align-items:center;gap:8px;padding:4px 0}
.zone-player-row img{width:36px;height:36px;image-rendering:pixelated;object-fit:contain}

/* ── Cards & Panels ── */
.card{background:var(--panel);border:2px solid var(--border);border-radius:6px;padding:12px;margin-bottom:10px}
.ct{font-family:'Press Start 2P';font-size:8px;color:var(--gold);margin-bottom:8px}
.panel{background:var(--bg2);border:1px solid var(--border);border-radius:4px;padding:10px;margin-bottom:8px}

/* ── Buttons ── */
.btn{display:block;width:100%;padding:12px 16px;border:2px solid;border-radius:4px;font-family:'Nunito';font-weight:800;font-size:14px;cursor:pointer;text-align:center;transition:transform .1s,opacity .15s}
.btn:active{transform:scale(.97)}.btn:disabled{opacity:.4;cursor:not-allowed}
.btn-gold{background:var(--gold);border-color:#c09020;color:#0a0a1a}
.btn-blue{background:var(--blue);border-color:#2060c0;color:#fff}
.btn-red{background:var(--red);border-color:#a02020;color:#fff}
.btn-green{background:var(--green);border-color:#208060;color:#0a0a1a}
.btn-gray{background:var(--dim);border-color:var(--gray);color:var(--white)}
.btn-purple{background:var(--purple);border-color:#7020b0;color:#fff}
.btn-sm{padding:8px 12px;font-size:12px;width:auto;display:inline-block}

/* ── Input ── */
.inp{width:100%;padding:12px;background:var(--panel);border:2px solid var(--border);border-radius:4px;color:var(--white);font-family:'Nunito';font-size:16px;margin-bottom:12px;outline:none}
.inp:focus{border-color:var(--gold)}
.pin-inp{font-family:'Press Start 2P';font-size:20px;text-align:center;letter-spacing:4px}
textarea.inp{resize:none;height:80px;font-size:14px;line-height:1.5}

/* ── Flow screen ── */
.flow{display:flex;flex-direction:column;align-items:center;min-height:100dvh;padding:24px 20px 32px;background:var(--bg);overflow-y:auto}
.flow-inner{width:100%;max-width:360px}
.flow-title{font-family:'Press Start 2P';font-size:12px;color:var(--gold);text-align:center;line-height:1.8;margin-bottom:6px}
.flow-sub{font-size:12px;color:var(--gray);text-align:center;margin-bottom:20px}
.steps{display:flex;gap:8px;justify-content:center;margin-bottom:24px}
.step-dot{width:10px;height:10px;border-radius:50%;background:var(--dim)}
.step-dot.done{background:var(--green)}.step-dot.active{background:var(--gold)}

/* ── Class / Genre grids ── */
.classe-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;width:100%}
.classe-card{background:var(--panel);border:2px solid var(--border);border-radius:6px;padding:12px 8px;text-align:center;cursor:pointer;transition:border-color .15s,background .15s}
.classe-card:active{transform:scale(.97)}.classe-card.sel{border-color:var(--gold);background:rgba(240,192,64,.08)}
.classe-card img{width:96px;height:96px;image-rendering:pixelated;object-fit:contain;display:block;margin:0 auto 8px}
.classe-card .cc-name{font-family:'Press Start 2P';font-size:7px;color:var(--white);margin-bottom:4px}
.classe-card .cc-desc{font-size:10px;color:var(--gray)}
.genre-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;width:100%}
.genre-card{background:var(--panel);border:2px solid var(--border);border-radius:6px;padding:14px 8px;text-align:center;cursor:pointer;transition:border-color .15s,background .15s}
.genre-card:active{transform:scale(.97)}.genre-card.sel{border-color:var(--gold);background:rgba(240,192,64,.08)}
.genre-card img{width:120px;height:120px;image-rendering:pixelated;object-fit:contain;display:block;margin:0 auto 10px}
.genre-card .gc-label{font-family:'Press Start 2P';font-size:8px;color:var(--white)}

/* ── Wait room ── */
.wait-code{font-family:'Press Start 2P';font-size:28px;color:var(--gold);letter-spacing:6px;text-align:center;margin:8px 0}
.wait-pr{display:flex;align-items:center;gap:10px;padding:10px;background:var(--panel);border:1px solid var(--border);border-radius:6px;margin-bottom:8px}
.wait-pr img{width:56px;height:56px;image-rendering:pixelated;object-fit:contain;flex-shrink:0}

/* ── Joueurs list ── */
.pr{display:flex;align-items:center;gap:10px;padding:10px;background:var(--panel);border:1px solid var(--border);border-radius:4px;margin-bottom:8px;cursor:pointer}
.pr img{width:64px;height:64px;image-rendering:pixelated;object-fit:contain;flex-shrink:0}
.pr-info{flex:1;min-width:0}
.pr-name{font-weight:800;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pr-sub{font-size:11px;color:var(--gray);margin-top:2px}
.pr-right{text-align:right;flex-shrink:0;display:flex;flex-direction:column;align-items:flex-end;gap:4px}

/* ── Carte ── */
.carte-wrap{padding:12px}
.zg{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}
.zc{background:var(--panel);border:2px solid var(--border);border-radius:8px;padding:14px 10px;text-align:center;cursor:pointer;transition:border-color .15s,transform .1s}
.zc:active{transform:scale(.97)}.zc.obj{border-color:var(--gold);box-shadow:0 0 10px rgba(240,192,64,.4)}
.zc.mine{border-color:var(--blue);background:rgba(64,128,240,.08)}
.zc.mine.obj{border-color:var(--gold)}
.zc-count{font-size:10px;color:var(--purple);margin-top:4px;font-weight:700}

/* ── Journal ── */
.ev{padding:10px 12px;border-left:3px solid var(--border);margin-bottom:8px;font-size:12px;line-height:1.6}
.ev.success{border-color:var(--green)}.ev.fail{border-color:var(--red)}.ev.info{border-color:var(--blue)}.ev.critical{border-color:var(--gold)}.ev.mj{border-color:var(--purple)}
.ev-time{font-size:10px;color:var(--gray);margin-top:4px}

/* ── Chat ── */
.chat-wrap{display:flex;flex-direction:column;height:calc(100dvh - 128px)}
.chat-msgs{flex:1;overflow-y:auto;padding:10px 12px}
.chat-msg{background:var(--panel);border-radius:8px;padding:8px 10px;margin-bottom:6px}
.chat-msg.mine{background:rgba(64,128,240,.15);border:1px solid rgba(64,128,240,.3)}
.chat-msg-name{font-size:10px;color:var(--gold);font-weight:800;margin-bottom:3px}
.chat-msg.mine .chat-msg-name{color:var(--blue)}
.chat-msg-text{font-size:13px;line-height:1.5}
.chat-msg-time{font-size:10px;color:var(--gray);margin-top:3px}
.chat-input-row{padding:8px 12px;background:var(--bg2);border-top:1px solid var(--border);display:flex;gap:8px;align-items:center}
.chat-input-row input{flex:1;padding:10px 12px;background:var(--panel);border:1px solid var(--border);border-radius:20px;color:var(--white);font-family:'Nunito';font-size:14px;outline:none}
.chat-input-row input:focus{border-color:var(--blue)}
.chat-send{background:var(--blue);border:none;border-radius:50%;width:38px;height:38px;color:#fff;font-size:18px;cursor:pointer;flex-shrink:0}

/* ── Numpad ── */
.numpad-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:12px 0}
.numpad-key{background:var(--panel);border:2px solid var(--border);border-radius:8px;padding:14px;font-family:'Nunito';font-weight:800;font-size:20px;color:var(--white);cursor:pointer;text-align:center;transition:transform .1s,background .1s}
.numpad-key:active{transform:scale(.93);background:var(--dim)}
.numpad-key.del{color:var(--orange)}.numpad-key.ok{background:var(--gold);border-color:#c09020;color:#0a0a1a}
.numpad-display{font-family:'Press Start 2P';font-size:24px;letter-spacing:10px;text-align:center;min-height:44px;padding:8px;background:var(--bg);border-radius:8px;margin-bottom:4px}

/* ── Dice ── */
.dice-result{text-align:center;padding:16px 0}
.dice-num{font-family:'Press Start 2P';font-size:48px;margin:8px 0;animation:dice-pop .3s ease}
@keyframes dice-pop{0%{transform:scale(.6) rotate(-8deg)}70%{transform:scale(1.15) rotate(2deg)}100%{transform:scale(1) rotate(0)}}
.dice-label{font-size:15px;font-weight:800;margin-bottom:12px}
.dice-text{font-size:13px;line-height:1.7;white-space:pre-line;color:var(--white)}
.dice-xp{font-size:12px;color:var(--blue);margin-top:8px;font-weight:700}

/* ── Modal ── */
.mb{position:fixed;inset:0;background:rgba(0,0,0,.78);z-index:200;display:flex;align-items:flex-end;justify-content:center}
.mo{background:var(--bg2);border-top:2px solid var(--border);border-radius:14px 14px 0 0;width:100%;max-width:480px;padding:20px;max-height:82dvh;overflow-y:auto}

/* ── Notification ── */
.notif{position:fixed;top:16px;left:50%;transform:translateX(-50%);background:var(--panel);border:2px solid var(--gold);border-radius:8px;padding:10px 18px;font-size:13px;font-weight:700;z-index:300;max-width:340px;text-align:center;animation:nfade .3s ease;pointer-events:none}
@keyframes nfade{from{transform:translateX(-50%) translateY(-14px);opacity:0}to{transform:translateX(-50%) translateY(0);opacity:1}}

/* ── Badges ── */
.badge{font-size:10px;padding:2px 8px;border-radius:4px;font-weight:700}
.badge-admin{background:var(--purple);color:#fff}
.badge-obj{background:var(--gold);color:#0a0a1a}
.badge-cd{background:var(--dim);color:var(--orange);font-size:9px}

/* ── Misc ── */
@keyframes blink{50%{opacity:.3}}
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.sk-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.sk-stars{color:var(--gold);font-size:14px;min-width:52px;text-align:right}
</style>

function pid(){let id=localStorage.getItem('mj_pid');if(!id){id='p'+Math.random().toString(36).slice(2,10);localStorage.setItem('mj_pid',id)}return id}

function gZL(){return DATA?.config?.zones||ZONES}
// Normalise "8" → "C08", "c8" → "C08", "C08" → "C08". Retourne null si invalide.
function parseCardId(v){v=String(v).trim().toUpperCase().replace(/^C/,'');const n=parseInt(v);if(isNaN(n)||n<1||n>100)return null;return'C'+String(n).padStart(2,'0')}
// Supprime l'ancienne carte assignée à la même cible avant d'en assigner une nouvelle
async function clearCardFor(target){const cm=DATA?.config?.cardMap||{};const old=Object.keys(cm).find(c=>cm[c]===target);if(old)await DB.ref('/config/cardMap/'+old).remove()}
function playerTitle(p){return(TITLES[p.classe]||TITLES.Guerrier)[stadeOf(p.xp||0)]}
function genCode(){const c='ABCDEFGHJKLMNPQRSTUVWXYZ23456789';return Array.from({length:4},()=>c[Math.floor(Math.random()*c.length)]).join('')}
function fmtTs(ts){if(!ts)return'';const d=new Date(ts);return d.getHours().toString().padStart(2,'0')+':'+d.getMinutes().toString().padStart(2,'0')}
function fmtMs(ms){const s=Math.ceil(ms/1000);return s>=60?Math.floor(s/60)+'m'+(s%60)+'s':s+'s'}
function timerStr(){if(!DATA?.game?.timerEnd)return'--:--';const r=DATA.game.timerEnd-Date.now();if(r<=0)return'00:00';return Math.floor(r/60000).toString().padStart(2,'0')+':'+Math.floor((r%60000)/1000).toString().padStart(2,'0')}
function cdMs(){return(DATA?.config?.timerMinutes||30)*0.12*60000}
function cdOk(tid){return Date.now()-(ME?.cooldowns?.[tid]||0)>cdMs()}
function cdLeft(tid){return Math.max(0,cdMs()-(Date.now()-(ME?.cooldowns?.[tid]||0)))}

function spriteSrc(classe,genre,xp){return'Sprite/'+classe+'/'+classe+'_'+genre+'_'+STADES[stadeOf(xp||0)]+'.png'}
function spriteFb(classe,genre){return'Sprite/'+classe+'/'+classe+'_'+genre+'.png'}
function sImg(classe,genre,xp,size,cls){
  if(!classe||!genre)return'<div style="width:'+size+'px;height:'+size+'px;background:var(--dim);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:'+(size*.3)+'px">'+(CLASS_INFO[classe]?.icon||'❓')+'</div>';
  const src=spriteSrc(classe,genre,xp),fb=spriteFb(classe,genre);
  return'<img src="'+src+'" width="'+size+'" height="'+size+'" class="'+(cls||'')+'" style="image-rendering:pixelated;object-fit:contain" loading="lazy" onerror="if(this.src!==\''+fb+'\'){this.src=\''+fb+'\'}else{this.style.opacity=.2}">';
}

function notify(msg,col){
  clearTimeout(notifT);document.querySelector('.notif')?.remove();
  const d=document.createElement('div');d.className='notif';d.style.borderColor=col||'var(--gold)';d.innerHTML=msg;
  document.body.appendChild(d);notifT=setTimeout(()=>d.remove(),3500)
}

// ══ FIREBASE ══
function initFB(){
  firebase.initializeApp(FB_CFG);
  DB=firebase.database();myId=pid();myPin=getPin();
  DB.ref('/').on('value',snap=>{
    const v=snap.val();
    if(!v){DB.ref('/').set(DEF);return}
    DATA=v;ME=DATA.players&&DATA.players[myId]||null;
    if(ME&&!ME.isAdmin){
      const hasAdmin=Object.values(DATA.players||{}).some(p=>p.isAdmin);
      if(!hasAdmin)DB.ref('/players/'+myId+'/isAdmin').set(true);
    }
    if(!creating)render();
  },err=>{document.getElementById('app').innerHTML='<div style="padding:20px;color:#e04040;font-size:12px">Erreur DB : '+err.message+'</div>'});
}
const fbSet=(p,v)=>DB.ref(p).set(v);
const fbUpd=(p,u)=>DB.ref(p).update(u);
const fbPush=(p,v)=>DB.ref(p).push(v);
function addEv(type,text,pid2){fbPush('/events',{type,text,ts:Date.now(),pid:pid2||null})}

// ══ ROUTER ══
function render(){
  if(!DATA){document.getElementById('app').innerHTML='<div class="loading"><div class="loading-title">MJ</div><div class="loading-sub">Connexion...</div></div>';return}
  if(DATA.game.status==='ended'){renderEnd();return}
  if(!DATA.config?.gameCode||!ME){if(!creating)renderHome();return}
  if(DATA.game.status==='lobby'){renderWait();return}
  renderGame()
}

function startFlow(mode){

// ── Étape 0 : scan / saisie de la carte avant le flow join ──
function showJoinCardModal(){
  showModal('<div class="ct">🃏 Ta carte joueur</div>'
    +'<div style="font-size:12px;color:var(--gray);margin-bottom:16px">Commence par scanner ou entrer le numéro de ta carte.</div>'
    +'<div style="display:flex;gap:8px;margin-bottom:6px">'
    +'<input id="join-card-inp" class="inp" style="flex:1;margin:0;text-transform:uppercase;font-size:18px;text-align:center" placeholder="C07" maxlength="4" autocomplete="off" oninput="this.value=this.value.toUpperCase()">'
    +'<button class="btn btn-gold btn-sm" onclick="confirmJoinCard()">→</button></div>'

    +'<div id="join-card-err" style="color:var(--red);font-size:11px;margin-top:8px;text-align:center"></div>')
}
window.confirmJoinCard=function(){
  const v=parseCardId(document.getElementById('join-card-inp')?.value||'');
  if(!v){document.getElementById('join-card-err').textContent='Numéro invalide — ex : 7 ou C07';return}
  _startJoinFlow(v)
};
window.scanJoinCard=function(){
  showScanner(url=>{
    const m=url.match(/#qr:card:(C\d+)/);
    if(!m){notify('QR non reconnu — scanne une carte du deck','var(--red)');return}
    _startJoinFlow(m[1])
  },'📷 Scanne ta carte joueur')
};
function _startJoinFlow(cardId){
  closeModal();
  creating=true;
  flow={mode:'join',step:1,data:{name:'',classe:'',genre:'',pin:'',code:'',cardId}};
  renderFlow()
}
// Storage event : si le scan s'est ouvert dans un autre onglet
window.addEventListener('storage',function(e){
  if(e.key==='mj_join_card_result'&&e.newValue&&creating){
    localStorage.removeItem('mj_join_card_result');_startJoinFlow(e.newValue)
  }
});
function totalSteps(){return flow.mode==='create'?4:5}
function renderFlow(){document.getElementById('app').innerHTML='<div class="flow"><div class="flow-inner">'+flowHtml()+'</div></div>'}
function dots(){const n=totalSteps();return'<div class="steps">'+Array.from({length:n},(_,i)=>'<div class="step-dot'+(i+1<flow.step?' done':i+1===flow.step?' active':'')+'"></div>').join('')+'</div>'}

function flowHtml(){
  const s=flow.step,d=flow.data,isJoin=flow.mode==='join';
  const codeS=isJoin?1:null,nameS=isJoin?2:1,classeS=isJoin?3:2,genreS=isJoin?4:3,pinS=isJoin?5:4;
  if(s===codeS)return'<div class="flow-title" style="font-size:11px">Rejoindre une partie</div>'
    +'<div class="flow-sub">Code de partie (4 caractères)</div>'+dots()
    +'<input id="f-code" class="inp pin-inp" placeholder="ABCD" maxlength="4" style="text-transform:uppercase" autocomplete="off">'
    +'<button class="btn btn-blue" onclick="flowNext()">Rejoindre →</button>'
    +'<button class="btn btn-gray" style="margin-top:8px" onclick="renderHome()">← Retour</button>';
  if(s===nameS)return'<div class="flow-title" style="font-size:11px">'+(flow.mode==='create'?'Nouvelle partie':'Ton aventurier')+'</div>'
    +'<div class="flow-sub">Choisis ton nom d\'aventurier</div>'+dots()
    +'<input id="f-name" class="inp" placeholder="Pseudo..." maxlength="20" value="'+d.name+'" autocomplete="off">'
    +'<button class="btn btn-gold" onclick="flowNext()">Continuer →</button>'
    +'<button class="btn btn-gray" style="margin-top:8px" onclick="flowBack()">← Retour</button>';
  if(s===classeS){
    const grid=CLASSES.map(k=>'<div class="classe-card'+(d.classe===k?' sel':'')+'" onclick="flowSet(\'classe\',\''+k+'\')">'
      +'<img src="'+spriteSrc(k,d.genre||'Male',0)+'" onerror="if(this.src!==\''+spriteFb(k,d.genre||'Male')+'\'){this.src=\''+spriteFb(k,d.genre||'Male')+'\'}else{this.style.opacity=.2}">'
      +'<div class="cc-name">'+k+'</div><div class="cc-desc">'+CLASS_INFO[k].desc+'</div></div>').join('');
    return'<div class="flow-title" style="font-size:11px">Ton archétype</div>'
      +'<div class="flow-sub">Quelle est ta classe ?</div>'+dots()
      +'<div class="classe-grid">'+grid+'</div>'
      +'<button class="btn btn-gold" style="margin-top:12px" onclick="flowNext()"'+(d.classe?'':' disabled')+'>Continuer →</button>'
      +'<button class="btn btn-gray" style="margin-top:8px" onclick="flowBack()">← Retour</button>';
  }
  if(s===genreS){
    const mk=(g,lbl)=>'<div class="genre-card'+(d.genre===g?' sel':'')+'" onclick="flowSet(\'genre\',\''+g+'\')">'
      +'<img src="'+spriteSrc(d.classe,g,0)+'" onerror="if(this.src!==\''+spriteFb(d.classe,g)+'\'){this.src=\''+spriteFb(d.classe,g)+'\'}else{this.style.opacity=.2}">'
      +'<div class="gc-label">'+lbl+'</div></div>';
    return'<div class="flow-title" style="font-size:11px">'+d.classe+'</div>'
      +'<div class="flow-sub">Choisis ton genre</div>'+dots()
      +'<div class="genre-grid">'+mk('Male','♂ Masculin')+mk('Female','♀ Féminin')+'</div>'
      +'<button class="btn btn-gold" style="margin-top:12px" onclick="flowNext()"'+(d.genre?'':' disabled')+'>Continuer →</button>'
      +'<button class="btn btn-gray" style="margin-top:8px" onclick="flowBack()">← Retour</button>';
  }
  if(s===pinS){
    const pinVal=flow.data.pin||'';
    const dots4=Array.from({length:6},(_,i)=>pinVal.length>i?'●':'·').join(' ');
    return'<div class="flow-title" style="font-size:11px">PIN Secret</div>'
      +'<div class="flow-sub">4 à 6 chiffres pour protéger ton inventaire</div>'+dots()
      +'<div style="display:flex;justify-content:center;margin-bottom:12px">'+sImg(d.classe,d.genre,0,100,'hero-sprite s0')+'</div>'
      +'<div style="text-align:center;margin-bottom:12px"><div style="font-family:\'Press Start 2P\';font-size:8px;color:var(--gold)">'+d.name+'</div></div>'
      +'<div class="numpad-display" style="margin-bottom:8px">'+dots4+'</div>'
      +'<div class="numpad-grid">'
      +[1,2,3,4,5,6,7,8,9].map(n=>'<button class="numpad-key" onclick="flowPinKey(\''+n+'\')">'+n+'</button>').join('')
      +'<button class="numpad-key del" onclick="flowPinKey(\'del\')">⌫</button>'
      +'<button class="numpad-key" onclick="flowPinKey(\'0\')">0</button>'
      +'<button class="numpad-key ok" onclick="flowFinish()" '+(pinVal.length>=4?'':'disabled')+'>✓</button>'
      +'</div>'
      +'<button class="btn btn-gray" style="margin-top:8px" onclick="flowBack()">← Retour</button>';
  }
  return'';
}

window.flowPinKey=function(k){
  const d=flow.data;
  if(k==='del')d.pin=(d.pin||'').slice(0,-1);
  else if((d.pin||'').length<6)d.pin=(d.pin||'')+k;
  renderFlow()
};
window.flowNext=async function(){
  const s=flow.step,d=flow.data,isJoin=flow.mode==='join';
  const nameS=isJoin?2:1,classeS=isJoin?3:2;
  if(isJoin&&s===1){
    const v=document.getElementById('f-code')?.value?.toUpperCase().trim();
    if(!v||v.length!==4){notify('Code invalide (4 caractères)','var(--red)');return}
    const snap=await DB.ref('/config/gameCode').get();
    if(!snap.val()||snap.val()!==v){notify('Code introuvable','var(--red)');return}
    d.code=v;
  }
  if(s===nameS){const v=document.getElementById('f-name')?.value?.trim();if(!v||v.length<2){notify('Pseudo trop court','var(--red)');return}d.name=v}
  if(s===classeS&&!d.classe){notify('Choisis une classe','var(--red)');return}
  flow.step++;renderFlow()
};
window.flowBack=function(){if(flow.step<=1){renderHome();return}flow.step--;renderFlow()};
window.flowSet=function(key,val){flow.data[key]=val;renderFlow()};
window.flowFinish=async function(){
  const pin=flow.data.pin;
  if(!pin||pin.length<4){notify('PIN trop court (4 chiffres)','var(--red)');return}
  savePin(pin);
  const d=flow.data,amAdmin=flow.mode==='create';
  if(amAdmin){
    const code=genCode();
    await DB.ref('/').set({...DEF,config:{...DEF.config,timerMinutes:30,gameCode:code,gameId:Date.now()}});
    addEv('system','Partie créée — Code : '+code,null); // 'system' = filtré du journal
  }
  const player={name:d.name,classe:d.classe,genre:d.genre,pin:d.pin,
    xp:0,gold:0,skills:{fouille:0,vol:0,espionnage:0,parole:0},skillXp:{fouille:0,vol:0,espionnage:0,parole:0},
    pityCounts:{fouille:0,vol:0,espionnage:0,parole:0,negociation:0},
    inventory:[],cooldowns:{},zone:null,online:true,isAdmin:amAdmin,joinedAt:Date.now()};
  await fbSet('/players/'+myId,player);
  if(d.cardId&&!amAdmin)await fbSet('/config/cardMap/'+d.cardId,'player:'+myId);
  addEv('system',d.name+(amAdmin?' crée':'  rejoint')+' la partie',myId);
  creating=false;render()
};

window.kickPlayer=async function(pid2){const p=DATA.players[pid2];if(!p)return;await DB.ref('/players/'+pid2).remove();addEv('info',p.name+' a été expulsé.',myId);notify(p.name+' expulsé','var(--orange)')};
window.adminStart=async function(){
  const inp=document.getElementById('tl')||document.getElementById('adm-t');
  const t=parseInt(inp?.value||30);
  const zz=Object.keys(gZL());
  const rz=zz[Math.floor(Math.random()*zz.length)];

  addEv('mj','⚔️ La quête commence ! Durée : '+t+' min.',null);

};

function rHero(){
  const xp=ME?.xp||0,s=stadeOf(xp);
  const nextXp=s<3?XP_STADE[s+1]:null;
  const pct=nextXp?Math.round((xp-XP_STADE[s])/(nextXp-XP_STADE[s])*100):100;
  const myZone=ME?.zone,zName=myZone&&gZ(myZone)?.name||null;

  // Joueurs dans la même zone (excluant soi)
  const sameZone=myZone?Object.entries(DATA.players||{}).filter(([id,p])=>id!==myId&&p.zone===myZone):[];

  // Zone chip
  const zoneBlock='<div class="zone-chip" onclick="showZonePicker()">'
    +'<div>'+(myZone?'<div style="font-size:10px;color:var(--gray)">Zone actuelle</div><div class="zone-name">'+gZ(myZone)?.icon+' '+zName+'</div>':'<div class="zone-name" style="color:var(--gray)">📍 Aucune zone</div>')+'</div>'
    +'<div class="zone-chip-btn">Changer →</div></div>';

  // Sprite central (cliquable)
  const spriteBlock='<div class="hero-sprite-wrap" onclick="showActionSheet()">'
    +sImg(ME.classe,ME.genre,xp,160,'hero-sprite s'+s)+'</div>';

  // Infos perso (sans or)
  const infoBlock='<div style="width:100%;text-align:center">'
    +'<div class="hero-name">'+ME.name+'</div>'
    +'<div class="hero-title">'+playerTitle(ME)+' · '+ME.classe+'</div>'
    +'<div style="width:100%;padding:0 20px">'
    +'<div class="xp-bar"><div class="xp-fill" style="width:'+pct+'%;background:linear-gradient(90deg,var(--purple),var(--blue))"></div></div>'
    +'<div class="xp-label">'+xp+(nextXp?' / '+nextXp+' XP':'  ✨ Maîtrise absolue')+' · '+STADES[s]+'</div></div>'
    +(getMyCard()?'<button onclick="showMyQR()" style="background:none;border:1px solid var(--border);border-radius:12px;color:var(--gray);font-size:10px;padding:4px 12px;cursor:pointer;margin-top:6px">📱 Mon QR</button>':'')
    +'</div>';

  // Actions rapides
  const canSocial=myZone&&sameZone.length>0;
  const canFouille=myZone&&cdOk(myZone+'_fouille');
  const fouilleCd=myZone&&!cdOk(myZone+'_fouille')?fmtMs(cdLeft(myZone+'_fouille')):null;

  const actions='<div class="hero-actions">'
    +'<div class="action-row">'
    +mkActionBtn('🔍','Fouiller',myZone?gZ(myZone)?.name:'Choisir une zone',canFouille,fouilleCd,'doFouille()')
    +mkActionBtn('🤏','Voler',sameZone.length>0?sameZone.length+' joueur'+(sameZone.length>1?'s':''):myZone?'Seul ici':'Choisir zone',canSocial,null,'showTargets(\'vol\')')
    +'</div><div class="action-row">'
    +mkActionBtn('👁️','Espionner',sameZone.length>0?sameZone.length+' dispo':myZone?'Seul ici':'Choisir zone',canSocial,null,'showTargets(\'espionnage\')')
    +mkActionBtn('💬','Parler',sameZone.length>0?sameZone.length+' dispo':myZone?'Seul ici':'Choisir zone',canSocial,null,'showTargets(\'parole\')')
    +mkActionBtn('🤝','Négocier',sameZone.length>0?sameZone.length+' dispo':myZone?'Seul ici':'Choisir zone',canSocial,null,'showTargets(\'negociation\')')
    +'</div></div>';

  // Joueurs dans la zone
  const zonePlayersBlock=myZone&&sameZone.length>0
    ?'<div class="zone-players">'
      +'<div class="zone-players-title">👤 Dans cette zone</div>'
      +sameZone.map(([id,p])=>'<div class="zone-player-row">'
        +sImg(p.classe,p.genre,p.xp||0,36)
        +'<div style="flex:1"><div style="font-weight:700;font-size:13px">'+p.name+'</div>'
        +'<div style="font-size:10px;color:var(--gray)">'+playerTitle(p)+'</div></div>'
        +'<button style="background:var(--panel);border:1px solid var(--border);border-radius:4px;color:var(--white);font-size:11px;padding:4px 8px;cursor:pointer" onclick="onPlayer(\''+id+'\')">→</button>'
        +'</div>').join('')
      +'</div>'
    :'';

  return'<div class="hero-screen">'+zoneBlock+spriteBlock+infoBlock+actions+zonePlayersBlock+'</div>'
}

function mkActionBtn(icon,label,sub,available,cd,onclick){
  const dis=!available||cd;
  return'<div class="action-btn'+(available&&!cd?' available':(available?' available':' disabled'))+(available&&!cd?' highlight':'')+'"'
    +(!dis?' onclick="'+onclick+'"':'')+'>'
    +'<div class="action-icon">'+icon+'</div>'
    +'<div class="action-label">'+label+'</div>'
    +'<div class="action-sub">'+(cd?'⏳ '+cd:sub)+'</div></div>'
}

// ══ MOTEUR DE DÉS ══
function rollDice(action,skillLvl){
  const pity=ME?.pityCounts?.[action]||0;
  const raw=Math.floor(Math.random()*20)+1;
  if(pity>=6)return{raw,modified:20,result:'critical',xp:3};
  const bonus=skillLvl+(pity>=4?7:pity>=2?3:0);
  const mod=Math.min(20,Math.max(1,raw+bonus));
  const result=mod<=5?'critical_fail':mod<=10?'fail':mod<=15?'success':mod<=19?'strong_success':'critical';
  return{raw,modified:mod,result,xp:result.includes('fail')?1:3}
}
function showDice(roll,text){
  const col=roll.result.includes('fail')?'var(--red)':roll.result==='critical'?'var(--gold)':'var(--green)';
  showModal('<div class="dice-result"><div style="font-size:12px;color:var(--gray)">🎲 1d20</div>'
    +'<div class="dice-num" style="color:'+col+'">'+roll.modified+'</div>'
    +(roll.raw!==roll.modified?'<div style="font-size:10px;color:var(--gray)">(brut : '+roll.raw+')</div>':'')
    +'<div class="dice-label '+roll.result+'" style="color:'+col+'">'+RESULT_LABELS[roll.result]+'</div>'
    +'<div class="dice-text">'+text+'</div>'
    +'<div class="dice-xp">+'+roll.xp+' XP</div></div>'
    +'<button class="btn btn-gray" style="margin-top:8px" onclick="closeModal();renderTab()">OK</button>')
}

// ══ XP & COMPÉTENCES ══
async function applyXP(skillKey,xpAmt){
  // XP global → sprite stade
  const curXp=ME?.xp||0,newXp=curXp+xpAmt;
  const oldS=stadeOf(curXp),newS=stadeOf(newXp);
  // XP compétence → niveau compétence
  const curSkillLvl=ME?.skills?.[skillKey]||0;
  const curSkillXp=ME?.skillXp?.[skillKey]||0;
  let newSkillXp=curSkillXp+xpAmt,newSkillLvl=curSkillLvl;
  if(newSkillLvl<3&&newSkillXp>=XP_SKILL[newSkillLvl]){newSkillXp-=XP_SKILL[newSkillLvl];newSkillLvl++;notify('⭐ '+SKILLS[skillKey].label+' niveau '+newSkillLvl+' !','var(--gold)')}
  if(newS>oldS){notify('✨ '+STADES[newS]+' ! '+playerTitle({...ME,xp:newXp}),'var(--purple)');setTimeout(()=>{const el=document.querySelector('.hero-sprite');if(el){el.classList.add('levelup-anim');setTimeout(()=>el.classList.remove('levelup-anim'),1300)}},200)}
  await fbUpd('/players/'+myId,{xp:newXp,['skills/'+skillKey]:newSkillLvl,['skillXp/'+skillKey]:newSkillXp})
}
async function setPity(action,ok){await fbSet('/players/'+myId+'/pityCounts/'+action,ok?0:(ME?.pityCounts?.[action]||0)+1)}
async function setCd(tid){await fbSet('/players/'+myId+'/cooldowns/'+tid,Date.now())}

// ══ ACTIONS DE JEU ══
async function searchZone(zid){
  if(!zid){notify('Choisis d\'abord une zone sur la carte','var(--gray)');return}
  if(!cdOk(zid+'_fouille')){notify('⏳ '+fmtMs(cdLeft(zid+'_fouille')),'var(--orange)');renderTab();return}
  const sl=ME?.skills?.fouille||0;
  const roll=rollDice('fouille',sl);
  await fbSet('/players/'+myId+'/cooldowns/'+zid+'_fouille',Date.now());
  await applyXP('fouille',roll.xp);await setPity('fouille',!roll.result.includes('fail'));
  await fbUpd('/players/'+myId,{zone:zid});
  let txt='',gold=0;
  if(roll.result.includes('fail')){
    txt=roll.result==='critical_fail'?'Vous faites du bruit et attirez l\'attention !':'Rien d\'intéressant ici.';
    addEv('fail',ME.name+' fouille '+gZ(zid)?.name+' sans succès',myId);
  } else {
    const mult=sl>=2?2:1;
    gold=Math.floor((5+Math.random()*25)*mult*(roll.result==='critical'?2:roll.result==='strong_success'?1.5:1));
    if(DATA.game.objectZone===zid&&!DATA.game.objectHolder){
      if(roll.result==='strong_success'||roll.result==='critical'){
        gold+=50;txt='🗝️ Vous trouvez L\'OBJET et '+gold+' 🪙 !';
        await fbUpd('/game',{objectHolder:myId,objectZone:null});
        await fbUpd('/players/'+myId,{hasObject:true,gold:(ME.gold||0)+gold});
        addEv('critical','🗝️ '+ME.name+' trouve L\'OBJET dans '+gZ(zid)?.name+' !',myId);
        showDice(roll,txt);return;
      } else txt='Une présence mystérieuse... quelque chose est caché ici. +'+gold+' 🪙';
    } else txt='+'+gold+' 🪙 trouvés.';
    await fbUpd('/players/'+myId,{gold:(ME.gold||0)+gold});
    addEv('success',ME.name+' fouille '+gZ(zid)?.name,myId);
  }
  showDice(roll,txt)
}

async function stealPlayer(tid){
  if(!cdOk(tid)){notify('⏳ '+fmtMs(cdLeft(tid)),'var(--orange)');return}
  const sl=ME?.skills?.vol||0,tgt=DATA.players[tid];
  const roll=rollDice('vol',sl);
  await setCd(tid);await applyXP('vol',roll.xp);await setPity('vol',!roll.result.includes('fail'));
  if(roll.result.includes('fail')){
    const pen=roll.result==='critical_fail'?Math.floor((ME.gold||0)*0.1):0;
    if(pen>0)await fbUpd('/players/'+myId,{gold:Math.max(0,(ME.gold||0)-pen)});
    if(sl<3)addEv('fail',ME.name+' tente de voler '+tgt.name+' — Raté',myId);
    showDice(roll,pen?'Pris en flagrant délit ! −'+pen+' 🪙':'Vol raté. Mieux vaut décamper.');
  } else {
    let stolen=0,txt='';
    if(roll.result==='critical'&&tgt.hasObject){
      txt='🗝️ Vous volez L\'OBJET à '+tgt.name+' !';
      await fbUpd('/game',{objectHolder:myId});
      await fbUpd('/players/'+myId,{hasObject:true});
      await fbUpd('/players/'+tid,{hasObject:false});
      addEv('critical',ME.name+' vole L\'OBJET à '+tgt.name+' !',myId);
    } else {
      stolen=Math.max(0,Math.min(tgt.gold||0,Math.floor(Math.random()*(tgt.gold||0)*0.3)+(sl>=2?20:0)));
      if(roll.result!=='success')stolen=Math.floor(stolen*1.5);
      txt='Vous volez '+stolen+' 🪙 à '+tgt.name+'.';
      await fbUpd('/players/'+myId,{gold:(ME.gold||0)+stolen});
      await fbUpd('/players/'+tid,{gold:Math.max(0,(tgt.gold||0)-stolen)});
      if(sl<3)addEv('info',ME.name+' rôde autour de '+tgt.name,myId);
    }
    showDice(roll,txt)
  }
}

async function spyPlayer(tid){
  if(!cdOk(tid)){notify('⏳ '+fmtMs(cdLeft(tid)),'var(--orange)');return}
  const sl=ME?.skills?.espionnage||0,tgt=DATA.players[tid];
  const roll=rollDice('espionnage',sl);
  await setCd(tid);await applyXP('espionnage',roll.xp);await setPity('espionnage',!roll.result.includes('fail'));
  addEv('info',ME.name+' observe '+tgt.name,myId);
  if(roll.result.includes('fail')){
    const _fzl=Object.keys(gZL());const fz=_fzl[Math.floor(Math.random()*_fzl.length)];
    showDice(roll,'Informations peu fiables...\nZone signalée : '+gZ(fz)?.name+(sl>=1?' (peut-être)':' (non vérifié)'));return;
  }
  const lines=['Zone : '+(tgt.zone&&gZ(tgt.zone)?gZ(tgt.zone)?.name:'Inconnue')];
  if(sl>=2||roll.result==='strong_success'||roll.result==='critical')lines.push('Or : '+( tgt.gold||0)+' 🪙');
  else lines.push('Or : ~'+Math.round((tgt.gold||0)/20)*20+' 🪙 (approx.)');
  if(sl>=3||roll.result==='critical')lines.push('Objet : '+(tgt.hasObject?'✅ EN SA POSSESSION':'❌ Non'));
  showDice(roll,lines.join('\n'))
}

async function talkPlayer(tid){
  if(!cdOk(tid)){notify('⏳ '+fmtMs(cdLeft(tid)),'var(--orange)');return}
  const sl=ME?.skills?.parole||0,tgt=DATA.players[tid];
  const roll=rollDice('parole',sl);
  await setCd(tid);await applyXP('parole',roll.xp);await setPity('parole',!roll.result.includes('fail'));
  addEv('info',ME.name+' parle avec '+tgt.name,myId);
  if(roll.result.includes('fail')){showDice(roll,tgt.name+' refuse de vous parler.\n"Laisse-moi tranquille !"');return}
  const opts=['Demander sa zone actuelle','Demander s\'il a l\'objet','Flatter pour obtenir une info'];
  if(sl>=1)opts.push('Le menacer subtilement');if(sl>=3)opts.push('Détecter s\'il ment');
  const shown=roll.result==='success'?opts.slice(0,2):opts;
  const rel=roll.result==='critical'?'(très fiable)':roll.result==='strong_success'?'(fiable)':'(peut mentir)';
  showDice(roll,tgt.name+' vous répond '+rel+'.\n\nOptions :\n'+shown.map(o=>'• '+o).join('\n'))
}

async function negotiatePlayer(tid){
  if(!cdOk(tid)){notify('⏳ '+fmtMs(cdLeft(tid)),'var(--orange)');return}
  const sl=ME?.skills?.parole||0,tgt=DATA.players[tid];
  const roll=rollDice('negociation',sl);
  await setCd(tid);await applyXP('parole',roll.xp);await setPity('negociation',!roll.result.includes('fail'));
  addEv('info',ME.name+' négocie avec '+tgt.name,myId);
  if(roll.result.includes('fail')){
    if(roll.result==='critical_fail'&&sl<2){await fbUpd('/players/'+myId,{gold:Math.max(0,(ME.gold||0)-10)});notify('Arnaque ratée −10 🪙','var(--red)')}
    showDice(roll,tgt.name+' refuse catégoriquement de négocier.');return;
  }
  showDice(roll,tgt.name+' accepte de négocier !\nÉchangez vos conditions en vrai.\nRésultat convenu entre vous.')
}

// ══ VICTOIRE ══
async function checkVictory(){
  if(DATA?.game?.status!=='playing')return;
  if(!DATA.game.timerEnd||Date.now()<DATA.game.timerEnd)return;
  if(DATA.game.objectHolder){
    const w=DATA.players[DATA.game.objectHolder];
    await fbUpd('/game',{status:'ended',winner:DATA.game.objectHolder,winnerMsg:'🏆 '+w.name+' remporte la quête avec l\'objet !'});
    addEv('critical','🏆 '+w.name+' gagne la partie !',DATA.game.objectHolder);
  } else {
    let mx=-1,wid=null;
    Object.entries(DATA.players||{}).forEach(([id,p])=>{if((p.gold||0)>mx){mx=p.gold;wid=id}});
    if(wid){const w=DATA.players[wid];await fbUpd('/game',{status:'ended',winner:wid,winnerMsg:'💰 '+w.name+' gagne avec '+mx+' 🪙 !'});addEv('critical','💰 '+w.name+' gagne !',wid)}
  }
}

// ══ MODAL ══
function showModal(html){closeModal();const bd=document.createElement('div');bd.className='mb';bd.innerHTML='<div class="mo">'+html+'</div>';bd.addEventListener('click',e=>{if(e.target===bd)closeModal()});document.body.appendChild(bd)}
function closeModal(){_stopScanHard();document.querySelector('.mb')?.remove()}
window.closeModal=closeModal;

// ══ SCANNER IN-APP (jsQR) ══
let _scanStream=null,_scanIv=null;
function _stopScanHard(){clearInterval(_scanIv);_scanIv=null;if(_scanStream){_scanStream.getTracks().forEach(t=>t.stop());_scanStream=null}}
window.stopScanner=function(){_stopScanHard();closeModal()};

function showScanner(onResult,title){
  title=title||'📷 Scanner un QR code';
  showModal('<div class="ct">'+title+'</div>'
    +'<div class="qr-wrap"><video id="qr-vid" autoplay playsinline muted></video>'
    +'<canvas id="qr-cvs" style="display:none"></canvas>'
    +'<div class="qr-finder"><div class="qr-finder-box"></div></div>'
    +'<div class="qr-scan-line"></div></div>'
    +'<div id="qr-status" style="text-align:center;font-size:11px;color:var(--gray);margin:10px 0">Pointe la caméra vers un QR code...</div>'
    +'<button class="btn btn-gray" onclick="stopScanner()">Annuler</button>');
  if(!navigator.mediaDevices?.getUserMedia){
    notify('Caméra non disponible sur ce navigateur','var(--red)');closeModal();return
  }
  navigator.mediaDevices.getUserMedia({video:{facingMode:{ideal:'environment'},width:{ideal:1280}}})
    .then(stream=>{
      _scanStream=stream;
      const vid=document.getElementById('qr-vid');
      if(!vid){_stopScanHard();return}
      vid.srcObject=stream;
      _scanIv=setInterval(()=>{
        const v=document.getElementById('qr-vid'),c=document.getElementById('qr-cvs');
        if(!v||!c||v.readyState<2)return;
        c.width=v.videoWidth;c.height=v.videoHeight;
        const ctx=c.getContext('2d');ctx.drawImage(v,0,0);
        const img=ctx.getImageData(0,0,c.width,c.height);
        const code=typeof jsQR==='function'&&jsQR(img.data,img.width,img.height,{inversionAttempts:'dontInvert'});
        if(code&&code.data){_stopScanHard();closeModal();onResult(code.data)}
      },200)
    })
    .catch(()=>{notify('Autorise l\'accès à la caméra dans ton navigateur','var(--red)');closeModal()})
}

// Traite les données scannées (URL #qr:...) — partagé scanner in-app + handleHash
function _doQRParts(parts){
  const pending=JSON.parse(localStorage.getItem('mj_pending_assign')||'null');
  if(parts[0]==='card'&&pending){
    localStorage.removeItem('mj_pending_assign');
    const cid=parts[1];
    if(pending.target==='pending_join'){
      if(creating){_startJoinFlow(cid);return}
      localStorage.setItem('mj_join_card_result',cid);
      notify('✅ Carte '+cid+' reconnue — reviens sur l\'onglet du jeu','var(--green)');return
    }
    clearCardFor(pending.target).then(()=>fbSet('/config/cardMap/'+cid,pending.target)).then(()=>{
      notify('✅ Carte '+cid+' → '+pending.name,'var(--green)');renderTab()
    });return
  }
  if(!DATA||!ME){notify('Connecte-toi d\'abord','var(--orange)');return}
  if(parts[0]==='card'){
    const assign=DATA?.config?.cardMap?.[parts[1]];
    if(!assign){notify('Carte non assignée — demande à l\'admin','var(--orange)');return}
    const[type,ref]=assign.split(':');
    if(type==='zone'){if(!gZ(ref)){notify('Zone inconnue','var(--red)');return}moveZone(ref)}
    else if(type==='player'){if(ref===myId){notify('C\'est ta propre carte !','var(--gray)');return}onPlayer(ref)}
  } else if(parts[0]==='zone'){
    const zid=parts[1];if(!gZ(zid)){notify('Zone inconnue','var(--red)');return}moveZone(zid)
  } else if(parts[0]==='player'){
    const tid=parts[1];if(tid===myId){notify('C\'est ton propre QR !','var(--gray)');return}
    const p=DATA.players?.[tid];if(!p){notify('Joueur introuvable','var(--red)');return}onPlayer(tid)
  } else {notify('QR non reconnu','var(--orange)')}
}
function _parseQRUrl(url){
  const idx=url.indexOf('#qr:');
  if(idx===-1){notify('QR non reconnu','var(--orange)');return}
  _doQRParts(url.slice(idx+4).split(':'))
}
// Scanner universel (pendant la partie)
window.openGameScanner=function(){showScanner(_parseQRUrl,'📷 Scanner')};

function startTimer(){
  clearInterval(timerIv);
  timerIv=setInterval(()=>{
    const el=document.getElementById('tv');if(el){const r=DATA?.game?.timerEnd?DATA.game.timerEnd-Date.now():Infinity;el.textContent=timerStr();el.classList.toggle('warn',r<120000)}

    if(isAdmin()&&DATA?.game?.timerEnd&&Date.now()>=DATA.game.timerEnd)checkVictory()
  },1000)
}

<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#0a0a1a">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>MJ — Maître du Jeu</title>
<link rel="manifest" href="manifest.json">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Nunito:wght@400;700;800&display=swap" rel="stylesheet">

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
</head>
<style>
/* ── Variables ── */
:root{
  --bg:#0a0a1a;--bg2:#111128;--panel:#1a1a3a;--border:#3a3a6a;
  --gold:#f0c040;--green:#40c080;--red:#e04040;--blue:#4080f0;
  --purple:#a040f0;--gray:#606080;--white:#e0e0f0;--dim:#404060;--orange:#f08040
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);color:var(--white);font-family:'Nunito',sans-serif;overflow:hidden}
.px{font-family:'Press Start 2P',monospace}

/* ── Layout ── */
#app{height:100dvh;display:flex;flex-direction:column;max-width:480px;margin:0 auto}
.screen{flex:1;overflow-y:auto;padding:12px;padding-bottom:72px}

/* ── Loading ── */
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100dvh;gap:16px}
.loading-title{font-family:'Press Start 2P';font-size:14px;color:var(--gold)}
.loading-sub{font-size:12px;color:var(--gray)}

/* ── Header ── */
.hdr{padding:10px 12px;background:var(--bg2);border-bottom:2px solid var(--border);display:flex;align-items:center;gap:10px;flex-shrink:0}
.hdr img{width:52px;height:52px;image-rendering:pixelated;object-fit:contain;flex-shrink:0}
.hdr-info{flex:1;min-width:0}
.hdr-name{font-family:'Press Start 2P';font-size:8px;color:var(--gold);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hdr-sub{font-size:10px;color:var(--gray);margin-top:3px}
.hdr-right{text-align:right;flex-shrink:0}
.hdr-gold{font-weight:800;font-size:16px;color:var(--gold)}

/* ── Nav ── */
.nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;height:60px;background:var(--bg2);border-top:2px solid var(--border);display:flex;z-index:100}
.nb{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;font-size:10px;color:var(--gray);cursor:pointer;border:none;background:none;padding:4px}
.nb.active{color:var(--gold)}
.ni{font-size:20px}

/* ── Cards ── */
.card{background:var(--panel);border:2px solid var(--border);border-radius:4px;padding:12px;margin-bottom:10px}
.ct{font-family:'Press Start 2P';font-size:8px;color:var(--gold);margin-bottom:8px}
.panel{background:var(--bg2);border:1px solid var(--border);border-radius:4px;padding:10px;margin-bottom:8px}

/* ── Buttons ── */
.btn{display:block;width:100%;padding:12px 16px;border:2px solid;border-radius:4px;font-family:'Nunito';font-weight:800;font-size:14px;cursor:pointer;text-align:center;transition:transform .1s}
.btn:active{transform:scale(.97)}
.btn:disabled{opacity:.4;cursor:not-allowed}
.btn-gold{background:var(--gold);border-color:#c09020;color:#0a0a1a}
.btn-blue{background:var(--blue);border-color:#2060c0;color:#fff}
.btn-red{background:var(--red);border-color:#a02020;color:#fff}
.btn-green{background:var(--green);border-color:#208060;color:#0a0a1a}
.btn-gray{background:var(--dim);border-color:var(--gray);color:var(--white)}
.btn-sm{padding:8px 12px;font-size:12px;width:auto;display:inline-block}

/* ── Input ── */
.inp{width:100%;padding:12px;background:var(--panel);border:2px solid var(--border);border-radius:4px;color:var(--white);font-family:'Nunito';font-size:16px;margin-bottom:12px;outline:none}
.inp:focus{border-color:var(--gold)}
.pin-inp{font-family:'Press Start 2P';font-size:20px;text-align:center;letter-spacing:4px}

/* ── Flow screen ── */
.flow{display:flex;flex-direction:column;align-items:center;min-height:100dvh;padding:24px 20px 32px;background:var(--bg);overflow-y:auto}
.flow-inner{width:100%;max-width:360px}
.flow-title{font-family:'Press Start 2P';font-size:12px;color:var(--gold);text-align:center;line-height:1.8;margin-bottom:6px}
.flow-sub{font-size:12px;color:var(--gray);text-align:center;margin-bottom:20px}

/* ── Step dots ── */
.steps{display:flex;gap:8px;justify-content:center;margin-bottom:24px}
.step-dot{width:10px;height:10px;border-radius:50%;background:var(--dim)}
.step-dot.done{background:var(--green)}
.step-dot.active{background:var(--gold)}

/* ── Classe grid (2 cols, step 2) ── */
.classe-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;width:100%}
.classe-card{background:var(--panel);border:2px solid var(--border);border-radius:6px;padding:12px 8px;text-align:center;cursor:pointer;transition:border-color .15s,background .15s}
.classe-card:active{transform:scale(.97)}
.classe-card.sel{border-color:var(--gold);background:rgba(240,192,64,.08)}
.classe-card .cc-sprite{width:100px;height:100px;image-rendering:pixelated;object-fit:contain;display:block;margin:0 auto 8px}
.classe-card .cc-name{font-family:'Press Start 2P';font-size:7px;color:var(--white);margin-bottom:4px}
.classe-card .cc-desc{font-size:10px;color:var(--gray)}

/* ── Genre grid (2 cols, step 3) ── */
.genre-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;width:100%}
.genre-card{background:var(--panel);border:2px solid var(--border);border-radius:6px;padding:14px 8px;text-align:center;cursor:pointer;transition:border-color .15s,background .15s}
.genre-card:active{transform:scale(.97)}
.genre-card.sel{border-color:var(--gold);background:rgba(240,192,64,.08)}
.genre-card .gc-sprite{width:130px;height:130px;image-rendering:pixelated;object-fit:contain;display:block;margin:0 auto 10px}
.genre-card .gc-label{font-family:'Press Start 2P';font-size:8px;color:var(--white)}

/* ── Player rows ── */
.pr{display:flex;align-items:center;gap:10px;padding:10px;background:var(--panel);border:1px solid var(--border);border-radius:4px;margin-bottom:8px;cursor:pointer}
.pr img{width:72px;height:72px;image-rendering:pixelated;object-fit:contain;flex-shrink:0}
.pr-info{flex:1;min-width:0}
.pr-name{font-weight:800;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pr-sub{font-size:11px;color:var(--gray);margin-top:2px}
.pr-right{text-align:right;flex-shrink:0;display:flex;flex-direction:column;align-items:flex-end;gap:4px}

/* ── Wait room ── */
.wait-code{font-family:'Press Start 2P';font-size:28px;color:var(--gold);letter-spacing:6px;text-align:center;margin:8px 0}
.wait-pr{display:flex;align-items:center;gap:10px;padding:10px;background:var(--panel);border:1px solid var(--border);border-radius:6px;margin-bottom:8px}
.wait-pr img{width:60px;height:60px;image-rendering:pixelated;object-fit:contain;flex-shrink:0}

/* ── Zone grid ── */
.zg{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}
.zc{background:var(--panel);border:2px solid var(--border);border-radius:6px;padding:14px 10px;text-align:center;cursor:pointer;transition:border-color .15s}
.zc:active{border-color:var(--gold)}
.zc.obj{border-color:var(--gold);box-shadow:0 0 8px rgba(240,192,64,.4)}
.zc.mine{border-color:var(--blue)}

/* ── Journal ── */
.ev{padding:8px 10px;border-left:3px solid var(--border);margin-bottom:6px;font-size:12px;line-height:1.5}
.ev.success{border-color:var(--green)}.ev.fail{border-color:var(--red)}.ev.info{border-color:var(--blue)}.ev.critical{border-color:var(--gold)}

/* ── Modal ── */
.mb{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:200;display:flex;align-items:flex-end;justify-content:center}
.mo{background:var(--bg2);border-top:2px solid var(--border);border-radius:12px 12px 0 0;width:100%;max-width:480px;padding:20px;max-height:80dvh;overflow-y:auto}

/* ── Notification ── */
.notif{position:fixed;top:16px;left:50%;transform:translateX(-50%);background:var(--panel);border:2px solid var(--gold);border-radius:6px;padding:10px 16px;font-size:13px;font-weight:700;z-index:300;max-width:340px;text-align:center;animation:nfade .3s ease;pointer-events:none}
@keyframes nfade{from{transform:translateX(-50%) translateY(-14px);opacity:0}to{transform:translateX(-50%) translateY(0);opacity:1}}

/* ── Timer ── */
.timer-bar{background:var(--panel);border:2px solid var(--border);border-radius:4px;padding:8px 12px;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between}
.tv{font-family:'Press Start 2P';font-size:16px;color:var(--gold)}
.tv.warn{color:var(--red);animation:blink 1s infinite}
@keyframes blink{50%{opacity:.4}}

/* ── XP / Skill ── */
.xp-bar{background:var(--dim);height:7px;border-radius:4px;overflow:hidden;margin:4px 0}
.xp-fill{height:100%;transition:width .5s}
.sk-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.sk-stars{color:var(--gold);font-size:14px;min-width:52px;text-align:right}

/* ── Badges ── */
.badge{font-size:10px;padding:2px 7px;border-radius:3px;font-weight:700;white-space:nowrap}
.badge-admin{background:var(--purple);color:#fff}
.badge-obj{background:var(--gold);color:#0a0a1a}
.badge-me{background:var(--dim);color:var(--gray)}

/* ── Scrollbar ── */
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
</style>
<body>
<div id="app"><div class="loading"><div class="loading-title">MJ</div><div class="loading-sub">Chargement...</div></div></div>
<script>
window.onerror = function(m,s,l){
  document.getElementById('app').innerHTML = '<div style="padding:20px;color:#e04040;font-size:12px;word-break:break-all">Erreur L'+l+': '+m+'</div>';
  return true;
};

// ══ FIREBASE CONFIG ══
const FB_CFG = {
  apiKey:"AIzaSyARVKSCufGwhXEj-0-BFKDagJu9e4ubb6U",
  authDomain:"mj-maitre-du-jeu.firebaseapp.com",
  databaseURL:"https://mj-maitre-du-jeu-default-rtdb.europe-west1.firebasedatabase.app",

  storageBucket:"mj-maitre-du-jeu.firebasestorage.app",
  messagingSenderId:"912939080944",
  appId:"1:912939080944:web:fb7b31dd32a021f6133635"
};

// ══ CONSTANTES ══
const ZONES = {
  preau:{name:'Préau',icon:'🏛️'},cuisineExt:{name:'Cuisine Ext.',icon:'🔥'},
  jardin:{name:'Jardin',icon:'🌿'},parking:{name:'Parking',icon:'🚗'},
  piscine:{name:'Piscine',icon:'💧'},cuisine:{name:'Cuisine',icon:'🍳'},
  salon:{name:'Salon',icon:'🛋️'},entree:{name:'Entrée',icon:'🚪'},
  bar:{name:'Bar',icon:'🍺'},bibliotheque:{name:'Bibliothèque',icon:'📚'}
};

const CLASSES = ['Guerrier','Mage','Voleur','Barde','Druide','Nain'];

const CLASS_INFO = {
  Guerrier:{icon:'⚔️',desc:'Force & Combat',     bonus:'vol'},
  Mage:    {icon:'🔮',desc:'Magie & Espionnage',  bonus:'espionnage'},
  Voleur:  {icon:'🗡️',desc:'Discrétion & Vol',    bonus:'vol'},
  Barde:   {icon:'🎵',desc:'Charme & Négo',       bonus:'parole'},
  Druide:  {icon:'🌿',desc:'Nature & Fouille',     bonus:'fouille'},
  Nain:    {icon:'⛏️',desc:'Fouille & Résistance', bonus:'fouille'}
};

const TITLES = {
  Guerrier:['Écuyer',     'Chevalier',   'Paladin',     'Grand Paladin'],
  Mage:    ['Érudit',     'Mage',        'Archimage',   'Grand Archimage'],
  Voleur:  ['Gamin',      'Filou',       'Ombre',       'Maître des Ombres'],
  Barde:   ['Troubadour', 'Barde',       'Ménestrel',   'Grand Ménestrel'],
  Druide:  ['Initié',     'Druide',      'Archidruide', 'Druide Ancestral'],
  Nain:    ['Mineur',     'Forgeron',    'Maître Mineur','Roi des Nains']
};

const SKILLS = {
  fouille:    {label:'Fouille',    icon:'🔍'},
  vol:        {label:'Vol',        icon:'🤏'},
  espionnage: {label:'Espionnage', icon:'👁️'},
  parole:     {label:'Parole',     icon:'💬'}
};

// XP seuils pour stades sprites : Base / L1 / L2 / L3
const XP_STADE = [0, 100, 300, 600];
const STADES   = ['Base','L1','L2','L3'];

// XP seuils compétences 0→1 / 1→2 / 2→3
const XP_SKILL = [10, 30, 60];

const DEF = {
  game:{status:'lobby',objectZone:null,objectHolder:null,timerEnd:null,startedAt:null,winner:null,winnerMsg:null},
  config:{timerMinutes:30,activeZones:Object.keys(ZONES),cooldownRatio:0.12,gameCode:null,gameId:null},
  players:{},events:[],zones:{}
};

// ══ STATE ══
let DB, DATA=null, ME=null, myId, myPin;
let curTab='carte', timerIv=null, notifT=null, creating=false;
let flow={mode:null,step:1,data:{name:'',classe:'',genre:'',pin:'',code:''}};

// ══ UTILS ══
function pid(){let id=localStorage.getItem('mj_pid');if(!id){id='p'+Math.random().toString(36).slice(2,10);localStorage.setItem('mj_pid',id)}return id}
function getPin(){return localStorage.getItem('mj_pin')||null}
function savePin(p){localStorage.setItem('mj_pin',p);myPin=p}
function isAdmin(){return ME&&ME.isAdmin===true}
function genCode(){const c='ABCDEFGHJKLMNPQRSTUVWXYZ23456789';return Array.from({length:4},()=>c[Math.floor(Math.random()*c.length)]).join('')}
function fmtTs(ts){if(!ts)return'';const d=new Date(ts);return d.getHours().toString().padStart(2,'0')+':'+d.getMinutes().toString().padStart(2,'0')}
function fmtMs(ms){const s=Math.ceil(ms/1000);return s>=60?Math.floor(s/60)+'m'+(s%60)+'s':s+'s'}

function stadeOf(xp){return xp>=600?3:xp>=300?2:xp>=100?1:0}

function spriteSrc(classe,genre,xp){
  // Druide_Male_Base est nommé Druide_Male.png (exception)
  const st=STADES[stadeOf(xp||0)];
  return 'Sprite/'+classe+'/'+classe+'_'+genre+'_'+st+'.png';
}
function spriteFallback(classe,genre){
  // fallback sans _Base (ex: Druide_Male.png)
  return 'Sprite/'+classe+'/'+classe+'_'+genre+'.png';
}

function sImg(classe,genre,xp,size,extraStyle){
  size=size||80;
  if(!classe||!genre)return'<div style="width:'+size+'px;height:'+size+'px;background:var(--dim);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:'+(size*.35)+'px">'+(CLASS_INFO[classe]?.icon||'❓')+'</div>';
  const src=spriteSrc(classe,genre,xp);
  const fb=spriteFallback(classe,genre);
  return'<img src="'+src+'" width="'+size+'" height="'+size
    +'" style="image-rendering:pixelated;object-fit:contain'+(extraStyle?';'+extraStyle:'')+'" loading="lazy"'
    +' onerror="if(this.src!==\''+fb+'\'){this.src=\''+fb+'\'}else{this.style.opacity=.2}">';
}

function playerTitle(p){return(TITLES[p.classe]||TITLES.Guerrier)[stadeOf(p.xp||0)]}

function timerStr(){
  if(!DATA?.game?.timerEnd)return'--:--';
  const r=DATA.game.timerEnd-Date.now();
  if(r<=0)return'00:00';
  return Math.floor(r/60000).toString().padStart(2,'0')+':'+Math.floor((r%60000)/1000).toString().padStart(2,'0')
}

function notify(msg,col){
  clearTimeout(notifT);document.querySelector('.notif')?.remove();
  const d=document.createElement('div');d.className='notif';d.style.borderColor=col||'var(--gold)';d.innerHTML=msg;
  document.body.appendChild(d);notifT=setTimeout(()=>d.remove(),3000)
}

// ══ FIREBASE ══
function initFB(){
  firebase.initializeApp(FB_CFG);
  DB=firebase.database();myId=pid();myPin=getPin();
  DB.ref('/').on('value',snap=>{
    const v=snap.val();
    if(!v){DB.ref('/').set(DEF);return}
    DATA=v;ME=DATA.players&&DATA.players[myId]||null;
    if(ME&&!ME.isAdmin){
      const hasAdmin=Object.values(DATA.players||{}).some(p=>p.isAdmin);
      if(!hasAdmin)DB.ref('/players/'+myId+'/isAdmin').set(true);
    }
    if(!creating)render();
  },err=>{document.getElementById('app').innerHTML='<div style="padding:20px;color:#e04040;font-size:12px">Erreur DB : '+err.message+'</div>'});
}
const fbSet=(p,v)=>DB.ref(p).set(v);
const fbUpd=(p,u)=>DB.ref(p).update(u);
const fbPush=(p,v)=>DB.ref(p).push(v);
function addEv(type,text,pid2){fbPush('/events',{type,text,ts:Date.now(),pid:pid2||null})}

// ══ ROUTER ══
function render(){
  if(!DATA){document.getElementById('app').innerHTML='<div class="loading"><div class="loading-title">MJ</div><div class="loading-sub">Connexion...</div></div>';return}
  if(DATA.game.status==='ended'){renderEnd();return}
  if(!DATA.config?.gameCode||!ME){if(!creating)renderHome();return}
  if(DATA.game.status==='lobby'){renderWait();return}
  renderGame()
}

// ══ HOME ══
function renderHome(){
  creating=false;flow={mode:null,step:1,data:{name:'',classe:'',genre:'',pin:'',code:''}};
  const code=DATA?.config?.gameCode;
  const hasGame=code&&DATA?.game?.status==='lobby';
  document.getElementById('app').innerHTML=
    '<div class="flow"><div class="flow-inner" style="text-align:center">'
    +'<div style="margin:8px 0 28px">'
    +'<div class="flow-title" style="font-size:20px;margin-bottom:4px">MJ</div>'
    +'<div style="font-family:\'Press Start 2P\';font-size:9px;color:var(--gray);margin-bottom:10px">Maître du Jeu</div>'
    +'<div style="font-size:12px;color:var(--gray)">Jeu grandeur nature JRPG</div></div>'
    +(hasGame?'<div style="background:var(--panel);border:2px solid var(--gold);border-radius:8px;padding:14px;margin-bottom:20px">'
      +'<div style="font-size:11px;color:var(--gray);margin-bottom:6px">Partie en cours</div>'
      +'<div class="wait-code">'+code+'</div></div>':'')
    +'<button class="btn btn-gold" style="margin-bottom:12px" onclick="startFlow(\'create\')">🎮 Créer une partie</button>'
    +'<button class="btn btn-blue" onclick="startFlow(\'join\')">🔑 Rejoindre une partie</button>'
    +'</div></div>'
}
window.renderHome=renderHome;

// ══ FLOW — CRÉATION / REJOINDRE ══
function startFlow(mode){
  creating=true;
  flow={mode,step:1,data:{name:'',classe:'',genre:'',pin:'',code:''}};
  renderFlow()
}
window.startFlow=startFlow;

function totalSteps(){return flow.mode==='create'?4:5}

function renderFlow(){document.getElementById('app').innerHTML='<div class="flow"><div class="flow-inner">'+flowHtml()+'</div></div>'}

function dots(){
  const n=totalSteps();
  return'<div class="steps">'+Array.from({length:n},(_,i)=>'<div class="step-dot'+(i+1<flow.step?' done':i+1===flow.step?' active':'')+'"></div>').join('')+'</div>'
}

function flowHtml(){
  const s=flow.step,d=flow.data,m=flow.mode;
  // Pour "créer" : 1=pseudo 2=classe 3=genre 4=pin
  // Pour "rejoindre" : 1=code 2=pseudo 3=classe 4=genre 5=pin
  const isJoin=m==='join';
  const codeStep=isJoin?1:null;
  const nameStep=isJoin?2:1;
  const classeStep=isJoin?3:2;
  const genreStep=isJoin?4:3;
  const pinStep=isJoin?5:4;

  if(s===codeStep){
    return'<div class="flow-title" style="font-size:11px">Rejoindre une partie</div>'
      +'<div class="flow-sub">Code de partie (4 caractères)</div>'
      +dots()
      +'<input id="f-code" class="inp pin-inp" placeholder="ABCD" maxlength="4" style="text-transform:uppercase" autocomplete="off">'
      +'<button class="btn btn-blue" onclick="flowNext()">Rejoindre →</button>'
      +'<button class="btn btn-gray" style="margin-top:8px" onclick="renderHome()">← Retour</button>'
  }

  if(s===nameStep){
    const label=m==='create'?'Nouvelle partie':'Ton aventurier';
    return'<div class="flow-title" style="font-size:11px">'+label+'</div>'
      +'<div class="flow-sub">Choisis ton nom d\'aventurier</div>'
      +dots()
      +'<input id="f-name" class="inp" placeholder="Pseudo..." maxlength="20" value="'+d.name+'" autocomplete="off">'
      +'<button class="btn btn-gold" onclick="flowNext()">Continuer →</button>'
      +'<button class="btn btn-gray" style="margin-top:8px" onclick="flowBack()">← Retour</button>'
  }

  if(s===classeStep){
    const grid=CLASSES.map(k=>'<div class="classe-card'+(d.classe===k?' sel':'')+'" onclick="flowSet(\'classe\',\''+k+'\')">'
      +'<img class="cc-sprite" src="'+spriteSrc(k,d.genre||'Male',0)+'"'
      +' onerror="if(this.src!==\''+spriteFallback(k,d.genre||'Male')+'\'){this.src=\''+spriteFallback(k,d.genre||'Male')+'\'}else{this.style.opacity=.2}">'
      +'<div class="cc-name">'+k+'</div>'
      +'<div class="cc-desc">'+CLASS_INFO[k].desc+'</div></div>'
    ).join('');
    return'<div class="flow-title" style="font-size:11px">Ton archétype</div>'
      +'<div class="flow-sub">Quelle est ta classe ?</div>'
      +dots()
      +'<div class="classe-grid">'+grid+'</div>'
      +'<button class="btn btn-gold" style="margin-top:12px" onclick="flowNext()"'+(d.classe?'':' disabled')+'>Continuer →</button>'
      +'<button class="btn btn-gray" style="margin-top:8px" onclick="flowBack()">← Retour</button>'
  }

  if(s===genreStep){
    const mCard='<div class="genre-card'+(d.genre==='Male'?' sel':'')+'" onclick="flowSet(\'genre\',\'Male\')">'
      +'<img class="gc-sprite" src="'+spriteSrc(d.classe,'Male',0)+'"'
      +' onerror="if(this.src!==\''+spriteFallback(d.classe,'Male')+'\'){this.src=\''+spriteFallback(d.classe,'Male')+'\'}else{this.style.opacity=.2}">'
      +'<div class="gc-label">♂ Masculin</div></div>';
    const fCard='<div class="genre-card'+(d.genre==='Female'?' sel':'')+'" onclick="flowSet(\'genre\',\'Female\')">'
      +'<img class="gc-sprite" src="'+spriteSrc(d.classe,'Female',0)+'">'
      +'<div class="gc-label">♀ Féminin</div></div>';
    return'<div class="flow-title" style="font-size:11px">'+d.classe+'</div>'
      +'<div class="flow-sub">Choisis ton genre</div>'
      +dots()
      +'<div class="genre-grid">'+mCard+fCard+'</div>'
      +'<button class="btn btn-gold" style="margin-top:12px" onclick="flowNext()"'+(d.genre?'':' disabled')+'>Continuer →</button>'
      +'<button class="btn btn-gray" style="margin-top:8px" onclick="flowBack()">← Retour</button>'
  }

  if(s===pinStep){
    return'<div class="flow-title" style="font-size:11px">PIN Secret</div>'
      +'<div class="flow-sub">4 chiffres pour protéger ton inventaire</div>'
      +dots()
      +'<div style="display:flex;justify-content:center;margin-bottom:12px">'+sImg(d.classe,d.genre,0,120)+'</div>'
      +'<div style="text-align:center;margin-bottom:16px">'
      +'<div style="font-family:\'Press Start 2P\';font-size:8px;color:var(--gold)">'+d.name+'</div>'
      +'<div style="font-size:11px;color:var(--gray);margin-top:4px">'+(TITLES[d.classe]?.[0]||'')+' — '+d.classe+'</div>'
      +'</div>'
      +'<input id="f-pin" type="password" inputmode="numeric" class="inp pin-inp" placeholder="••••" maxlength="6">'
      +'<button class="btn btn-gold" onclick="flowFinish()">Rejoindre la partie !</button>'
      +'<button class="btn btn-gray" style="margin-top:8px" onclick="flowBack()">← Retour</button>'
  }

  return'<div style="color:var(--red)">Étape inconnue</div>'
}

window.flowNext=async function(){
  const s=flow.step,d=flow.data,m=flow.mode;
  const isJoin=m==='join';
  const nameStep=isJoin?2:1;
  const classeStep=isJoin?3:2;

  if(isJoin&&s===1){
    const v=document.getElementById('f-code')?.value?.toUpperCase().trim();
    if(!v||v.length!==4){notify('Code invalide (4 caractères)','var(--red)');return}
    const snap=await DB.ref('/config/gameCode').get();
    if(!snap.val()||snap.val()!==v){notify('Code introuvable — vérifie avec l\'hôte','var(--red)');return}
    d.code=v;
  }
  if(s===nameStep){
    const v=document.getElementById('f-name')?.value?.trim();
    if(!v||v.length<2){notify('Pseudo trop court (2 caractères min.)','var(--red)');return}
    d.name=v;
  }
  if(s===classeStep&&!d.classe){notify('Choisis une classe','var(--red)');return}
  flow.step++;renderFlow()
};

window.flowBack=function(){
  if(flow.step<=1){renderHome();return}
  flow.step--;renderFlow()
};

window.flowSet=function(key,val){
  flow.data[key]=val;renderFlow()
};

window.flowFinish=async function(){
  const pin=document.getElementById('f-pin')?.value;
  if(!pin||pin.length<4){notify('PIN trop court (4 chiffres min.)','var(--red)');return}
  flow.data.pin=pin;savePin(pin);
  const d=flow.data,amAdmin=flow.mode==='create';
  if(amAdmin){
    const code=genCode();
    await DB.ref('/').set({...DEF,config:{...DEF.config,timerMinutes:30,gameCode:code,gameId:Date.now()}});
    addEv('info','Partie créée — Code : '+code,null);
  }
  const player={
    name:d.name,classe:d.classe,genre:d.genre,pin:d.pin,
    xp:0,gold:0,
    skills:{fouille:0,vol:0,espionnage:0,parole:0},
    inventory:[],cooldowns:{},zone:null,
    online:true,isAdmin:amAdmin,joinedAt:Date.now()
  };
  await fbSet('/players/'+myId,player);
  addEv('info',d.name+(amAdmin?' crée':'  rejoint')+' la partie !',myId);
  creating=false;render()
};

    +'<div class="card"><div class="ct">💰 Or</div>'
    +'<div style="font-family:\'Press Start 2P\';font-size:28px;color:var(--gold);text-align:center;padding:8px 0">'+(ME?.gold||0)+' 🪙</div></div>'
    +(ME?.hasObject?'<div class="card" style="border-color:var(--gold);text-align:center"><div style="font-size:40px;margin:8px 0">🗝️</div>'
      +'<div style="font-weight:800;margin-bottom:8px">Vous possédez L\'OBJET</div>'
      +'<button class="btn btn-gray btn-sm" onclick="showHideMenu()">Cacher l\'objet...</button></div>':'')
    +'<button class="btn btn-gray btn-sm" onclick="lockInv()" style="display:block;margin:8px auto">🔒 Verrouiller</button></div>'
}
window.pinSubmit=function(){
  const v=document.getElementById('pin-i')?.value;
  if(!v||v.length<4){notify('PIN trop court','var(--red)');return}
  if(myPin&&v!==myPin){notify('PIN incorrect','var(--red)');return}
  if(!myPin){savePin(v);notify('PIN sauvegardé !','var(--green)')}
  renderTab()
};
window.lockInv=function(){myPin=null;renderTab()};
window.showHideMenu=function(){
  const zones=DATA.config?.activeZones||Object.keys(ZONES);
  showModal('<div style="font-family:\'Press Start 2P\';font-size:9px;color:var(--gold);text-align:center;margin-bottom:12px">🙈 Où cacher l\'objet ?</div>'
    +zones.map(z=>'<button class="btn btn-gray" style="margin-bottom:6px" onclick="hideObj(\''+z+'\')">'+ZONES[z].icon+' '+ZONES[z].name+'</button>').join('')
    +'<button class="btn btn-gray" style="margin-top:4px" onclick="closeModal()">Annuler</button>')
};
window.hideObj=async function(zid){
  closeModal();
  await fbUpd('/game',{objectHolder:null,objectZone:zid});
  await fbUpd('/players/'+myId,{hasObject:false});
  addEv('info',ME.name+' cache L\'OBJET...',myId);
  notify('Objet caché !','var(--green)')
};

// ══ ÉCRAN DE FIN ══
function renderEnd(){
  const msg=DATA.game.winnerMsg||'Partie terminée';
  const ranks=Object.values(DATA.players||{}).sort((a,b)=>(b.gold||0)-(a.gold||0));
  document.getElementById('app').innerHTML=
    '<div style="padding:24px 20px;overflow-y:auto;height:100dvh">'
    +'<div class="flow-title" style="font-size:10px;text-align:center;margin-bottom:8px">PARTIE TERMINÉE</div>'
    +'<div style="font-family:\'Press Start 2P\';font-size:11px;color:var(--gold);text-align:center;line-height:1.8;margin:16px 0">'+msg+'</div>'
    +'<div class="card"><div class="ct">🏆 Classement</div>'
    +ranks.map((p,i)=>'<div class="pr">'
      +'<div style="font-size:22px;min-width:28px">'+(['🥇','🥈','🥉'][i]||'#'+(i+1))+'</div>'
      +sImg(p.classe,p.genre,p.xp||0,64)
      +'<div class="pr-info"><div class="pr-name">'+p.name+'</div>'
      +'<div class="pr-sub">'+playerTitle(p)+' · '+STADES[stadeOf(p.xp||0)]+'</div></div>'
      +'<div style="font-weight:800;color:var(--gold);flex-shrink:0">'+(p.gold||0)+' 🪙</div></div>'
    ).join('')+'</div>'
    +(isAdmin()?'<button class="btn btn-red" onclick="confirmReset()">🔄 Nouvelle partie</button>':'')
    +'</div>'
}

window.confirmReset=function(){
  showModal('<div style="text-align:center;margin-bottom:16px;font-weight:800">Réinitialiser la partie ?</div>'
    +'<button class="btn btn-red" style="margin-bottom:8px" onclick="doReset()">Oui, réinitialiser</button>'
    +'<button class="btn btn-gray" onclick="closeModal()">Annuler</button>')
};
window.doReset=async function(){
  closeModal();
  const code=genCode();
  const kept=Object.fromEntries(Object.entries(DATA.players||{}).map(([id,p])=>
    [id,{...p,gold:0,hasObject:false,xp:0,skills:{fouille:0,vol:0,espionnage:0,parole:0},cooldowns:{},zone:null}]
  ));
  await DB.ref('/').set({...DEF,config:{...DEF.config,timerMinutes:DATA.config?.timerMinutes||30,gameCode:code,gameId:Date.now()},players:kept});
  notify('Nouvelle partie — Code : '+code,'var(--green)')
};

// ══ MODAL ══
function showModal(html){
  closeModal();
  const bd=document.createElement('div');bd.className='mb';
  bd.innerHTML='<div class="mo">'+html+'</div>';
  bd.addEventListener('click',e=>{if(e.target===bd)closeModal()});
  document.body.appendChild(bd)
}
function closeModal(){document.querySelector('.mb')?.remove()}
window.closeModal=closeModal;

// ══ TIMER ══
function startTimer(){
  clearInterval(timerIv);
  timerIv=setInterval(()=>{
    const el=document.getElementById('tv');
    if(el){
      el.textContent=timerStr();
      const r=DATA?.game?.timerEnd?DATA.game.timerEnd-Date.now():Infinity;
      el.classList.toggle('warn',r<120000)
    }
  },1000)
}

// ══ INIT ══
document.getElementById('app').innerHTML='<div class="loading"><div class="loading-title">MJ</div><div class="loading-sub">Connexion...</div></div>';
if('serviceWorker' in navigator)navigator.serviceWorker.register('./sw.js').catch(()=>{});
try{initFB()}catch(e){document.getElementById('app').innerHTML='<div style="padding:20px;color:#e04040;font-size:12px">Erreur : '+e.message+'</div>'}
</script>
</body>
</html>

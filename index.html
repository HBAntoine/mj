<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#0a0a1a">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>MJ — Maître du Jeu</title>
<link rel="manifest" href="manifest.json">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Nunito:wght@400;700;800&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
</head>
<style>
:root{--bg:#0a0a1a;--bg2:#111128;--panel:#1a1a3a;--border:#3a3a6a;--gold:#f0c040;--green:#40c080;--red:#e04040;--blue:#4080f0;--purple:#a040f0;--gray:#606080;--white:#e0e0f0;--dim:#404060;--orange:#f08040}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);color:var(--white);font-family:'Nunito',sans-serif;overflow:hidden}
#app{height:100dvh;display:flex;flex-direction:column;max-width:480px;margin:0 auto}
.screen{flex:1;overflow-y:auto;padding:12px;padding-bottom:72px}
.px{font-family:'Press Start 2P',monospace}
/* Nav */
.nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;height:60px;background:var(--bg2);border-top:2px solid var(--border);display:flex;z-index:100}
.nb{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;font-size:10px;color:var(--gray);cursor:pointer;border:none;background:none;padding:4px}
.nb.active{color:var(--gold)}
.ni{font-size:20px}
/* Header */
.hdr{padding:10px 12px;background:var(--bg2);border-bottom:2px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.hdr-t{font-family:'Press Start 2P';font-size:9px;color:var(--gold)}
/* Cards */
.card{background:var(--panel);border:2px solid var(--border);border-radius:4px;padding:12px;margin-bottom:10px}
.ct{font-family:'Press Start 2P';font-size:8px;color:var(--gold);margin-bottom:8px}
.panel{background:var(--bg2);border:1px solid var(--border);border-radius:4px;padding:10px;margin-bottom:8px}
/* Buttons */
.btn{display:block;width:100%;padding:12px 16px;border:2px solid;border-radius:4px;font-family:'Nunito';font-weight:800;font-size:14px;cursor:pointer;text-align:center;transition:transform .1s}
.btn:active{transform:scale(.97)}
.btn:disabled{opacity:.4;cursor:not-allowed}
.btn-gold{background:var(--gold);border-color:#c09020;color:#0a0a1a}
.btn-blue{background:var(--blue);border-color:#2060c0;color:#fff}
.btn-red{background:var(--red);border-color:#a02020;color:#fff}
.btn-green{background:var(--green);border-color:#208060;color:#0a0a1a}
.btn-gray{background:var(--dim);border-color:var(--gray);color:var(--white)}
.btn-sm{padding:8px 12px;font-size:12px;width:auto;display:inline-block}
/* Skills */
.sk-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.xb{flex:1;background:var(--dim);height:8px;border-radius:4px;overflow:hidden}
.xf{height:100%;background:var(--blue);transition:width .5s}
/* Players */
.pr{display:flex;align-items:center;gap:10px;padding:10px;background:var(--panel);border:1px solid var(--border);border-radius:4px;margin-bottom:8px;cursor:pointer}
.av{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;border:2px solid;flex-shrink:0}
/* Zone grid */
.zg{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}
.zc{background:var(--panel);border:2px solid var(--border);border-radius:6px;padding:14px 10px;text-align:center;cursor:pointer;transition:border-color .15s}
.zc:active{border-color:var(--gold)}
.zc.obj{border-color:var(--gold);box-shadow:0 0 8px rgba(240,192,64,.4)}
/* Journal */
.ev{padding:8px 10px;border-left:3px solid var(--border);margin-bottom:6px;font-size:12px;line-height:1.5}
.ev.success{border-color:var(--green)}.ev.fail{border-color:var(--red)}.ev.info{border-color:var(--blue)}.ev.critical{border-color:var(--gold)}
/* Modal */
.mb{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:200;display:flex;align-items:flex-end;justify-content:center}
.mo{background:var(--bg2);border-top:2px solid var(--border);border-radius:12px 12px 0 0;width:100%;max-width:480px;padding:20px;max-height:80dvh;overflow-y:auto}
/* Dice */
.dr{text-align:center;padding:16px}
.dn{font-family:'Press Start 2P';font-size:40px;margin:8px 0}
.dl{font-size:14px;font-weight:800}
.dl.critical,.dl.strong_success,.dl.success{color:var(--green)}
.dl.critical{color:var(--gold)}
.dl.fail,.dl.critical_fail{color:var(--red)}
/* Lobby */
.ls{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100dvh;padding:20px;background:var(--bg)}
.lt{font-family:'Press Start 2P';font-size:16px;color:var(--gold);text-align:center;line-height:1.8;margin-bottom:8px}
.sd{display:flex;gap:8px;margin-bottom:20px}
.sd span{width:10px;height:10px;border-radius:50%;background:var(--dim)}
.sd span.d{background:var(--green)}.sd span.a{background:var(--gold)}
/* Archetypes */
.ag{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;width:100%}
.ac{background:var(--panel);border:2px solid var(--border);border-radius:6px;padding:10px 6px;text-align:center;cursor:pointer}
.ac.sel{border-color:var(--gold)}
/* Colors */
.cg{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin:8px 0}
.cs{width:34px;height:34px;border-radius:50%;border:3px solid transparent;cursor:pointer}
.cs.sel{border-color:#fff}
/* Accessories */
.accg{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}
.accc{background:var(--panel);border:2px solid var(--border);border-radius:4px;padding:8px 4px;text-align:center;cursor:pointer;font-size:11px}
.accc.sel{border-color:var(--gold)}
/* Input */
.inp{width:100%;padding:12px;background:var(--panel);border:2px solid var(--border);border-radius:4px;color:var(--white);font-family:'Nunito';font-size:16px;margin-bottom:12px;outline:none}
.inp:focus{border-color:var(--gold)}
.pin{font-family:'Press Start 2P';font-size:20px;text-align:center;letter-spacing:4px}
/* Timer */
.tb{background:var(--panel);border:2px solid var(--border);border-radius:4px;padding:8px 12px;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between}
.tv{font-family:'Press Start 2P';font-size:16px;color:var(--gold)}
/* Notif */
.notif{position:fixed;top:16px;left:50%;transform:translateX(-50%);background:var(--panel);border:2px solid var(--gold);border-radius:6px;padding:10px 16px;font-size:13px;font-weight:700;z-index:300;max-width:340px;text-align:center;animation:nd .3s ease;pointer-events:none}
@keyframes nd{from{transform:translateX(-50%) translateY(-16px);opacity:0}to{transform:translateX(-50%) translateY(0);opacity:1}}
/* Timer warning */
.tv.warn{color:var(--red);animation:blink 1s infinite}
@keyframes blink{50%{opacity:.4}}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
</style>
<body><div id="app"></div>
<script>
// ══ FIREBASE CONFIG — remplacez ces valeurs ══
const FB_CFG = {
  apiKey:"AIzaSyARVKSCufGwhXEj-0-BFKDagJu9e4ubb6U",
  authDomain:"mj-maitre-du-jeu.firebaseapp.com",
  databaseURL:"https://mj-maitre-du-jeu-default-rtdb.europe-west1.firebasedatabase.app",
  projectId:"mj-maitre-du-jeu",
  storageBucket:"mj-maitre-du-jeu.firebasestorage.app",
  messagingSenderId:"912939080944",
  appId:"1:912939080944:web:fb7b31dd32a021f6133635"
};

// ══ CONSTANTES ══
const ZONES = {
  preau:{name:'Préau',icon:'🏛️'},cuisineExt:{name:'Cuisine Ext.',icon:'🔥'},
  jardin:{name:'Jardin',icon:'🌿'},parking:{name:'Parking',icon:'🚗'},
  piscine:{name:'Piscine',icon:'💧'},cuisine:{name:'Cuisine',icon:'🍳'},
  salon:{name:'Salon',icon:'🛋️'},entree:{name:'Entrée',icon:'🚪'},
  bar:{name:'Bar',icon:'🍺'},bibliotheque:{name:'Bibliothèque',icon:'📚'}
};
const ARCHETYPES = {
  guerrier:{name:'Guerrier',icon:'⚔️',col:'#e04040',bonus:'steal',evols:['Écuyer','Chevalier','Paladin'],desc:'Force & Vol'},
  mage:{name:'Mage',icon:'🔮',col:'#a040f0',bonus:'spy',evols:['Érudit','Mage','Archimage'],desc:'Espionnage'},
  voleur:{name:'Voleur',icon:'🗡️',col:'#808080',bonus:'steal',evols:['Gamin','Filou','Ombre'],desc:'Vol silencieux'},
  barde:{name:'Barde',icon:'🎵',col:'#f0c040',bonus:'talk',evols:['Troubadour','Barde','Ménestrel'],desc:'Négo & Charme'},
  archer:{name:'Archer',icon:'🏹',col:'#40c080',bonus:'search',evols:['Apprenti','Archer','Chasseur'],desc:'Fouille experte'},
  clerc:{name:'Clerc',icon:'✨',col:'#4080f0',bonus:'talk',evols:['Novice','Clerc','Grand Prêtre'],desc:'Parole divine'}
};
const COLORS=['#e04040','#f08040','#f0c040','#40c080','#40c0f0','#4080f0','#a040f0','#e040a0','#e0e0f0','#606080'];
const ACCS=['Aucun','Chapeau','Cape','Masque','Cicatrice','Tatouage','Plume','Couronne','Bandeau','Bouclier'];
const SKL={search:'Fouille',steal:'Vol',spy:'Espionnage',talk:'Parole'};
const SKLI={search:'🔍',steal:'🤏',spy:'👁️',talk:'💬'};
const XP_SK=[5,12,25];
const XP_GL=[10,25,45,70,100,135,175];
const RLBL={critical_fail:'💀 Échec Critique',fail:'✗ Échec',success:'✓ Succès',strong_success:'★ Succès Fort',critical:'⚡ Succès Critique'};
const DEF={
  game:{status:'lobby',objectZone:null,objectHolder:null,objectFoundAt:null,timerDuration:30,timerEnd:null,startedAt:null},
  config:{timerMinutes:30,activeZones:Object.keys(ZONES),cooldownRatio:0.12},
  players:{},events:[],zones:{}
};

// ══ STATE ══
let DB,DATA=null,ME=null,myId,myPin,curTab='map',timerIv=null,notifT=null,creating=false;

function pid(){let id=localStorage.getItem('mj_pid');if(!id){id='p'+Math.random().toString(36).slice(2,10);localStorage.setItem('mj_pid',id)}return id}
function getPin(){return localStorage.getItem('mj_pin')}
function savePin(p){localStorage.setItem('mj_pin',p);myPin=p}
function isAdmin(){return ME&&ME.isAdmin===true}
function playerTitle(p){const a=ARCHETYPES[p.archetype];if(!a)return'';const s=(p.level||0)>=7?2:(p.level||0)>=4?1:0;return a.evols[s]}

// ══ FIREBASE ══
function initFB(){
  firebase.initializeApp(FB_CFG);
  DB=firebase.database();
  myId=pid();myPin=getPin();
  DB.ref('/').on('value',snap=>{
    const v=snap.val();
    if(!v){DB.ref('/').set(DEF);return}
    DATA=v;ME=DATA.players&&DATA.players[myId]||null;
    if(!creating)render();
  });
}
const fbSet=(p,v)=>DB.ref(p).set(v);
const fbUpd=(p,u)=>DB.ref(p).update(u);
const fbPush=(p,v)=>DB.ref(p).push(v);

// ══ UTILS ══
function cdMs(){return(DATA?.config?.timerMinutes||30)*0.12*60000}
function cdOk(tid){return Date.now()-(ME?.cooldowns&&ME.cooldowns[tid]||0)>cdMs()}
function cdLeft(tid){return Math.max(0,cdMs()-(Date.now()-(ME?.cooldowns&&ME.cooldowns[tid]||0)))}
function fmtMs(ms){const s=Math.ceil(ms/1000);return s>=60?Math.floor(s/60)+'m'+(s%60)+'s':s+'s'}
function fmtTs(ts){if(!ts)return'';const d=new Date(ts);return d.getHours().toString().padStart(2,'0')+':'+d.getMinutes().toString().padStart(2,'0')}
function timerStr(){
  if(!DATA?.game?.timerEnd)return'--:--';
  const r=DATA.game.timerEnd-Date.now();
  if(r<=0)return'00:00';
  return Math.floor(r/60000).toString().padStart(2,'0')+':'+Math.floor((r%60000)/1000).toString().padStart(2,'0')
}
function notify(msg,col){
  clearTimeout(notifT);
  document.querySelector('.notif')?.remove();
  const d=document.createElement('div');
  d.className='notif';d.style.borderColor=col||'var(--gold)';d.innerHTML=msg;
  document.body.appendChild(d);
  notifT=setTimeout(()=>d.remove(),3000)
}
function addEv(type,text,pid2){fbPush('/events',{type,text,ts:Date.now(),pid:pid2||null})}

// ══ DICE ENGINE ══
function rollDice(action,skillLvl){
  const pity=ME?.pityCounts&&ME.pityCounts[action]||0;
  const raw=Math.floor(Math.random()*20)+1;
  if(pity>=6)return{raw,modified:20,result:'critical',xp:3};
  let bonus=skillLvl+(pity>=4?7:pity>=2?3:0);
  const mod=Math.min(20,Math.max(1,raw+bonus));
  const result=mod<=5?'critical_fail':mod<=10?'fail':mod<=15?'success':mod<=19?'strong_success':'critical';
  return{raw,modified:mod,result,xp:result.includes('fail')?1:3}
}

async function applyXP(skillKey,xpAmt){
  const s=ME?.skills&&ME.skills[skillKey]||{level:0,xp:0};
  let sx=(s.xp||0)+xpAmt,sl=s.level||0;
  if(sl<3&&sx>=XP_SK[sl]){sx-=XP_SK[sl];sl++;notify('⭐ '+SKL[skillKey]+' niv.'+sl,'var(--gold)')}
  let gx=(ME?.xp||0)+xpAmt,gl=ME?.level||0;
  if(gl<7&&gx>=XP_GL[gl]){gx-=XP_GL[gl];gl++;notify('🎉 Niv.'+gl+' ! '+playerTitle({...ME,level:gl}),'var(--purple)')}
  await fbUpd('/players/'+myId,{'skills/'+skillKey+'/xp':sx,'skills/'+skillKey+'/level':sl,xp:gx,level:gl})
}

async function setPity(action,ok){
  await fbSet('/players/'+myId+'/pityCounts/'+action,ok?0:(ME?.pityCounts&&ME.pityCounts[action]||0)+1)
}
async function setCd(tid){await fbSet('/players/'+myId+'/cooldowns/'+tid,Date.now())}

// ══ GAME ACTIONS ══
async function searchZone(zid){
  if(!cdOk(zid)){notify('⏳ '+fmtMs(cdLeft(zid)),'var(--orange)');return}
  const sl=ME?.skills?.search?.level||0;
  const roll=rollDice('search',sl);
  await setCd(zid);await applyXP('search',roll.xp);await setPity('search',!roll.result.includes('fail'));
  await fbUpd('/players/'+myId,{currentZone:zid});
  let txt='',gold=0;
  if(roll.result.includes('fail')){
    txt=roll.result==='critical_fail'?'Vous alertez tout le monde !':'Rien ici.';
    addEv('fail',ME.pseudo+' fouille '+ZONES[zid].name+' — Échec',myId);
  } else {
    const mult=sl>=2?2:1;
    gold=Math.floor((5+Math.random()*25)*mult*(roll.result==='critical'?2:roll.result==='strong_success'?1.5:1));
    if(DATA.game.objectZone===zid&&!DATA.game.objectHolder){
      if(roll.result==='strong_success'||roll.result==='critical'){
        gold+=50;txt='🗝️ Vous trouvez L\'OBJET et '+gold+' 🪙 !';
        await fbUpd('/game',{objectHolder:myId,objectZone:null,objectFoundAt:Date.now()});
        await fbUpd('/players/'+myId,{hasObject:true,gold:(ME.gold||0)+gold});
        addEv('critical','🗝️ '+ME.pseudo+' trouve L\'OBJET dans '+ZONES[zid].name+' !',myId);
        showDice(roll,txt);checkVictory();return;
      } else {txt='Quelque chose semble caché ici... +'+gold+' 🪙';}
    } else {txt='+'+gold+' 🪙 trouvées.';}
    await fbUpd('/players/'+myId,{gold:(ME.gold||0)+gold});
    addEv('success',ME.pseudo+' fouille '+ZONES[zid].name,myId);
  }
  showDice(roll,txt)
}

async function stealPlayer(tid){
  if(!cdOk(tid)){notify('⏳ '+fmtMs(cdLeft(tid)),'var(--orange)');return}
  const sl=ME?.skills?.steal?.level||0,tgt=DATA.players[tid];
  const roll=rollDice('steal',sl);
  await setCd(tid);await applyXP('steal',roll.xp);await setPity('steal',!roll.result.includes('fail'));
  const silent=sl>=3;
  if(roll.result.includes('fail')){
    const pen=roll.result==='critical_fail'?Math.floor((ME.gold||0)*0.1):0;
    if(pen>0)await fbUpd('/players/'+myId,{gold:Math.max(0,(ME.gold||0)-pen)});
    if(!silent)addEv('fail',ME.pseudo+' tente de voler '+tgt.pseudo+' — Échec',myId);
    showDice(roll,pen?'Pris en flagrant délit ! -'+pen+' 🪙':'Vol raté.');
  } else {
    let stolen=0,txt='';
    if(roll.result==='critical'&&tgt.hasObject){
      txt='🗝️ Vous volez L\'OBJET à '+tgt.pseudo+' !';
      await fbUpd('/game',{objectHolder:myId,objectZone:null});
      await fbUpd('/players/'+myId,{hasObject:true});
      await fbUpd('/players/'+tid,{hasObject:false});
      if(!silent)addEv('critical',ME.pseudo+' vole L\'OBJET à '+tgt.pseudo+' !',myId);
    } else {
      stolen=Math.max(0,Math.min(tgt.gold||0,Math.floor(Math.random()*(tgt.gold||0)*0.3)+(sl>=2?20:0)));
      if(roll.result!=='success')stolen=Math.floor(stolen*1.5);
      txt='Vous volez '+stolen+' 🪙 à '+tgt.pseudo+'.';
      await fbUpd('/players/'+myId,{gold:(ME.gold||0)+stolen});
      await fbUpd('/players/'+tid,{gold:Math.max(0,(tgt.gold||0)-stolen)});
      if(!silent)addEv('success',ME.pseudo+' vole '+tgt.pseudo,myId);
    }
    showDice(roll,txt)
  }
}

async function spyPlayer(tid){
  if(!cdOk(tid)){notify('⏳ '+fmtMs(cdLeft(tid)),'var(--orange)');return}
  const sl=ME?.skills?.spy?.level||0,tgt=DATA.players[tid];
  const roll=rollDice('spy',sl);
  await setCd(tid);await applyXP('spy',roll.xp);await setPity('spy',!roll.result.includes('fail'));
  addEv('info',ME.pseudo+' espionne '+tgt.pseudo,myId);
  if(roll.result.includes('fail')){
    const fz=Object.keys(ZONES)[Math.floor(Math.random()*10)];
    showDice(roll,'Zone : '+ZONES[fz].name+(sl>=1?' (peu fiable)':' (non fiable)'));return;
  }
  const lines=['Zone : '+(tgt.currentZone?ZONES[tgt.currentZone].name:'Inconnue')];
  if(sl>=2||roll.result==='strong_success'||roll.result==='critical')lines.push('Or : '+( tgt.gold||0)+' 🪙');
  else lines.push('Or : ~'+Math.round((tgt.gold||0)/20)*20+' 🪙 (approx.)');
  if(sl>=3||roll.result==='critical')lines.push('Objet : '+(tgt.hasObject?'✅ OUI':'❌ Non'));
  showDice(roll,lines.join('\n'))
}

async function talkPlayer(tid){
  if(!cdOk(tid)){notify('⏳ '+fmtMs(cdLeft(tid)),'var(--orange)');return}
  const sl=ME?.skills?.talk?.level||0,tgt=DATA.players[tid];
  const roll=rollDice('talk',sl);
  await setCd(tid);await applyXP('talk',roll.xp);await setPity('talk',!roll.result.includes('fail'));
  addEv('info',ME.pseudo+' parle à '+tgt.pseudo,myId);
  if(roll.result.includes('fail')){showDice(roll,tgt.pseudo+' refuse de vous parler.');return}
  const opts=['Demander sa zone','Demander l\'objet','Flatter pour info'];
  if(sl>=1)opts.push('Menacer');if(sl>=3)opts.push('Détecter mensonge');
  const shown=roll.result==='success'?opts.slice(0,2):opts;
  const rel=roll.result==='critical'?'(fiable)':roll.result==='strong_success'?'(assez fiable)':'(peut mentir)';
  showDice(roll,tgt.pseudo+' répond '+rel+'.\nOptions : '+shown.join(', '))
}

async function negotiatePlayer(tid){
  if(!cdOk(tid)){notify('⏳ '+fmtMs(cdLeft(tid)),'var(--orange)');return}
  const sl=ME?.skills?.talk?.level||0,tgt=DATA.players[tid];
  const roll=rollDice('negotiate',sl);
  await setCd(tid);await applyXP('talk',roll.xp);await setPity('negotiate',!roll.result.includes('fail'));
  addEv('info',ME.pseudo+' négocie avec '+tgt.pseudo,myId);
  if(roll.result.includes('fail')){
    if(roll.result==='critical_fail'&&sl<2){await fbUpd('/players/'+myId,{gold:Math.max(0,(ME.gold||0)-10)});notify('Arnaque ratée -10 🪙','var(--red)')}
    showDice(roll,tgt.pseudo+' refuse.');return;
  }
  showDice(roll,tgt.pseudo+' accepte de négocier ! Arrangez-vous en vrai.')
}

async function hideObj(zid){
  if(!ME?.hasObject){notify('Vous n\'avez pas l\'objet.','var(--red)');return}
  await fbUpd('/game',{objectHolder:null,objectZone:zid});
  await fbUpd('/players/'+myId,{hasObject:false});
  addEv('info',ME.pseudo+' cache L\'OBJET...',myId);
  notify('Objet caché !','var(--green)');closeModal()
}

async function checkVictory(){
  if(DATA?.game?.status!=='playing')return;
  if(!DATA.game.timerEnd||Date.now()<DATA.game.timerEnd)return;
  if(DATA.game.objectHolder){
    const w=DATA.players[DATA.game.objectHolder];
    await fbUpd('/game',{status:'ended',winner:DATA.game.objectHolder,winnerMsg:'🏆 '+w.pseudo+' remporte la partie avec l\'objet !'});
    addEv('critical','🏆 '+w.pseudo+' gagne !',DATA.game.objectHolder);
  } else {
    let mx=-1,wid=null;
    Object.entries(DATA.players||{}).forEach(([id,p])=>{if((p.gold||0)>mx){mx=p.gold;wid=id}});
    if(wid){const w=DATA.players[wid];await fbUpd('/game',{status:'ended',winner:wid,winnerMsg:'💰 '+w.pseudo+' gagne avec '+mx+' 🪙 !'});addEv('critical','💰 '+w.pseudo+' gagne !',wid)}
  }
}

// ══ RENDER CORE ══
function render(){
  if(!DATA){document.getElementById('app').innerHTML='<div style="display:flex;align-items:center;justify-content:center;height:100dvh;font-family:\'Press Start 2P\';font-size:10px;color:var(--gold)">Connexion...</div>';return}
  if(DATA.game.status==='ended'){renderEnd();return}
  if(!ME){renderLobby();return}
  if(DATA.game.status==='lobby'){renderWait();return}
  const a=document.getElementById('app');
  a.innerHTML=hdr()+'\n<div class="screen" id="sc"></div>\n'+nav();
  renderTab();startTimer()
}

function hdr(){
  return '<div class="hdr"><div><div class="hdr-t">'+(ME?.pseudo||'MJ')+'</div><div style="font-size:10px;color:var(--gray)">'+playerTitle(ME||{})+' · Niv.'+(ME?.level||0)+'</div></div>'
    +'<div style="text-align:right"><div style="font-size:16px;font-weight:800;color:var(--gold)">'+(ME?.gold||0)+' 🪙</div>'
    +(ME?.hasObject?'<div style="font-size:10px;color:var(--gold)">🗝️</div>':'')+'</div></div>'
}

function nav(){
  const tabs=[{id:'map',i:'🗺️',l:'Carte'},{id:'actions',i:'⚔️',l:'Actions'},{id:'players',i:'👥',l:'Joueurs'},{id:'journal',i:'📜',l:'Journal'},{id:'inventory',i:'🎒',l:'Sac'}];
  return '<nav class="nav">'+tabs.map(t=>'<button class="nb'+(curTab===t.id?' active':'')+'" onclick="setTab(\''+t.id+'\')" ><span class="ni">'+t.i+'</span>'+t.l+'</button>').join('')+'</nav>'
}

window.setTab=function(t){
  curTab=t;
  document.querySelectorAll('.nb').forEach(b=>b.classList.toggle('active',b.getAttribute('onclick').includes("'"+t+"'")));
  renderTab()
};

function renderTab(){
  const sc=document.getElementById('sc');if(!sc)return;
  if(curTab==='map')sc.innerHTML=rMap();
  else if(curTab==='actions')sc.innerHTML=rActions();
  else if(curTab==='players')sc.innerHTML=rPlayers();
  else if(curTab==='journal')sc.innerHTML=rJournal();
  else if(curTab==='inventory')sc.innerHTML=rInventory()
}

// ══ MAP ══
function rMap(){
  const zones=DATA.config?.activeZones||Object.keys(ZONES);
  const cards=zones.map(zid=>{
    const z=ZONES[zid],here=Object.values(DATA.players||{}).filter(p=>p.currentZone===zid);
    const cd=cdLeft(zid),isObj=isAdmin()&&DATA.game.objectZone===zid;
    return '<div class="zc'+(isObj?' obj':'')+'" onclick="onZone(\''+zid+'\')">'
      +'<div style="font-size:28px">'+z.icon+'</div>'
      +'<div style="font-size:11px;font-weight:700">'+z.name+'</div>'
      +(here.length?'<div style="font-size:10px;color:var(--gray)">'+here.map(p=>p.pseudo).join(', ')+'</div>':'')
      +(cd>0?'<div style="font-size:9px;color:var(--orange)">⏳ '+fmtMs(cd)+'</div>':'')
      +'</div>'
  }).join('');
  return '<div class="card"><div class="ct">🗺️ Zones</div><div class="zg">'+cards+'</div></div>'
}

window.onZone=function(zid){
  const z=ZONES[zid],cd=cdLeft(zid);

};
window.doSearch=async function(z){closeModal();await searchZone(z)};
window.doHide=async function(z){await hideObj(z)};

// ══ ACTIONS ══
function rActions(){
  const timer=DATA.game.timerEnd
    ?'<div class="tb"><div><div style="font-size:11px;color:var(--gray)">Temps restant</div><div class="tv'+(DATA.game.timerEnd-Date.now()<120000?' warn':'')+'" id="tv">'+timerStr()+'</div></div>'+(ME?.hasObject?'<div style="font-size:24px">🗝️</div>':'<div style="font-size:11px;color:var(--gray)">Objet libre</div>')+'</div>'
    :'<div class="panel" style="text-align:center;color:var(--gray)">En attente du démarrage...</div>';
  const skills=['search','steal','spy','talk'].map(k=>{
    const s=ME?.skills&&ME.skills[k]||{level:0,xp:0};
    const thr=XP_SK[Math.min(s.level,2)]||25,pct=s.level>=3?100:Math.floor((s.xp||0)/thr*100);
    return '<div class="sk-row"><span style="font-size:12px;flex:1">'+SKLI[k]+' '+SKL[k]+'</span>'
      +'<span style="color:var(--gold);font-size:13px">'+'⭐'.repeat(s.level)+'☆'.repeat(3-s.level)+'</span>'
      +'<div class="xb"><div class="xf" style="width:'+pct+'%"></div></div></div>'
  }).join('');
  const gt=XP_GL[Math.min(ME?.level||0,6)]||175,gp=(ME?.level||0)>=7?100:Math.floor((ME?.xp||0)/gt*100);
  const admin=isAdmin()?'<div class="card"><div class="ct">⚙️ Admin</div>'+(DATA.game.status==='lobby'
    ?'<label style="font-size:12px;color:var(--gray)">Durée (min)</label><input id="adm-t" type="number" class="inp" value="'+(DATA.config.timerMinutes||30)+'" min="5" max="120" style="margin:8px 0"><button class="btn btn-green" onclick="adminStart()">▶ Lancer la partie</button>'
    :'<button class="btn btn-red" onclick="adminEnd()">⏹ Terminer la partie</button>'+(DATA.game.objectHolder?'<div style="margin-top:8px;font-size:12px;color:var(--gray)">Objet chez : '+(DATA.players[DATA.game.objectHolder]?.pseudo||'?')+'</div>':DATA.game.objectZone?'<div style="margin-top:8px;font-size:12px;color:var(--gray)">Objet en : '+ZONES[DATA.game.objectZone]?.name+'</div>':''))+'</div>':'';
  return timer+'<div class="card"><div class="ct">📊 Compétences</div>'+skills+'<div style="margin-top:8px"><div style="font-size:11px;color:var(--gray);margin-bottom:4px">XP Global — Niv.'+(ME?.level||0)+'</div><div class="xb"><div class="xf" style="width:'+gp+'%;background:var(--purple)"></div></div></div></div>'
    +'<div class="card"><div class="ct">ℹ️ Actions</div><div style="font-size:12px;color:var(--gray)">Tape une zone sur la carte pour fouiller.<br>Tape un joueur pour voler / espionner / parler.</div></div>'+admin
}

window.adminStart=async function(){
  const t=parseInt(document.getElementById('adm-t')?.value||30);
  const zz=Object.keys(ZONES),rz=zz[Math.floor(Math.random()*zz.length)];
  await fbUpd('/config',{timerMinutes:t});
  await fbUpd('/game',{status:'playing',objectZone:rz,objectHolder:null,objectFoundAt:null,timerDuration:t,timerEnd:Date.now()+t*60000,startedAt:Date.now()});
  addEv('info','⚔️ La partie commence ! Durée : '+t+' min',null);notify('Partie lancée !','var(--green)')
};
window.adminEnd=async function(){
  await fbUpd('/game',{timerEnd:Date.now()-1});setTimeout(checkVictory,500)
};

// ══ PLAYERS ══
function rPlayers(){
  const ps=Object.entries(DATA.players||{});

window.onPlayer=function(tid){

    +'<div style="font-size:12px;color:var(--gray);margin-bottom:16px">'+playerTitle(p)+' · '+(p.currentZone&&ZONES[p.currentZone]?ZONES[p.currentZone].name:'Zone ?')+'</div></div>'
    +(cd>0?'<div style="text-align:center;color:var(--orange);margin-bottom:10px;font-size:12px">⏳ Cooldown : '+fmtMs(cd)+'</div>':'')
    +'<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px">'
    +'<button class="btn btn-red btn-sm" onclick="doSteal(\''+tid+'\')"'+(cd>0?' disabled':'')+'>🤏 Voler</button>'
    +'<button class="btn btn-blue btn-sm" onclick="doSpy(\''+tid+'\')"'+(cd>0?' disabled':'')+'>👁️ Espionner</button>'

window.doSteal=async function(t){closeModal();await stealPlayer(t)};
window.doSpy=async function(t){closeModal();await spyPlayer(t)};
window.doTalk=async function(t){closeModal();await talkPlayer(t)};
window.doNegotiate=async function(t){closeModal();await negotiatePlayer(t)};

window.pinSubmit=function(){

window.showHideMenu=function(){
  const zones=DATA.config?.activeZones||Object.keys(ZONES);

    +'<button class="btn btn-gray" style="margin-top:4px" onclick="closeModal()">Annuler</button>')

// ══ LOBBY ══
let lstep=1,ld={pseudo:'',archetype:'',color1:'#4080f0',color2:'#f0c040',accessory:'Aucun'};

function renderLobby(){
  creating=true;
  document.getElementById('app').innerHTML=lobbyHtml()
}

function dots(){return'<div class="sd">'+[1,2,3,4].map(i=>'<span class="'+(i<lstep?'d':i===lstep?'a':'')+'"></span>').join('')+'</div>'}

function lobbyHtml(){
  let c='';
  if(lstep===1){
    c='<div class="lt">MJ<br>Maître du Jeu</div>'
      +'<div style="font-size:12px;color:var(--gray);text-align:center;margin-bottom:16px">Ton nom d\'aventurier</div>'
      +dots()+'<input id="psi" class="inp" placeholder="Pseudo..." maxlength="20" value="'+ld.pseudo+'">'
      +'<button class="btn btn-gold" onclick="lNext()">Continuer →</button>'
  } else if(lstep===2){
    const cards=Object.entries(ARCHETYPES).map(([k,a])=>'<div class="ac'+(ld.archetype===k?' sel':'')+'" onclick="lArch(\''+k+'\')">'
      +'<div style="font-size:26px">'+a.icon+'</div><div style="font-size:11px;font-weight:800">'+a.name+'</div>'
      +'<div style="font-size:9px;color:var(--gray);margin-top:4px">'+a.evols.join(' → ')+'</div>'
      +'<div style="font-size:10px;color:var(--gray);margin-top:2px">'+a.desc+'</div></div>').join('');
    c='<div style="font-size:12px;color:var(--gray);text-align:center;margin-bottom:12px">Choisis ton archétype</div>'
      +dots()+'<div class="ag">'+cards+'</div>'
      +'<button class="btn btn-gold" style="margin-top:12px" onclick="lNext()"'+(ld.archetype?'':' disabled')+'>Continuer →</button>'
      +'<button class="btn btn-gray" style="margin-top:8px" onclick="lBack()">← Retour</button>'
  } else if(lstep===3){
    const sw1=COLORS.map(c2=>'<div class="cs'+(ld.color1===c2?' sel':'')+'" style="background:'+c2+'" onclick="lCol(\'color1\',\''+c2+'\')"></div>').join('');
    const sw2=COLORS.map(c2=>'<div class="cs'+(ld.color2===c2?' sel':'')+'" style="background:'+c2+'" onclick="lCol(\'color2\',\''+c2+'\')"></div>').join('');
    const acc=ACCS.map(a=>'<div class="accc'+(ld.accessory===a?' sel':'')+'" onclick="lAcc(\''+a+'\')">'+a+'</div>').join('');
    c='<div style="font-size:12px;color:var(--gray);text-align:center;margin-bottom:12px">Personnalise ton personnage</div>'
      +dots()+'<div class="card"><b style="font-size:12px">Couleur principale</b><div class="cg">'+sw1+'</div>'
      +'<b style="font-size:12px">Couleur secondaire</b><div class="cg">'+sw2+'</div>'
      +'<b style="font-size:12px">Accessoire</b><div class="accg" style="margin-top:8px">'+acc+'</div></div>'
      +'<button class="btn btn-gold" onclick="lNext()">Continuer →</button>'
      +'<button class="btn btn-gray" style="margin-top:8px" onclick="lBack()">← Retour</button>'
  } else {
    c='<div style="font-size:12px;color:var(--gray);text-align:center;margin-bottom:12px">PIN secret inventaire (4-6 chiffres)</div>'
      +dots()+'<input id="pin-s" type="password" inputmode="numeric" class="inp pin" placeholder="••••" maxlength="6">'
      +'<button class="btn btn-gold" onclick="lFinish()">Rejoindre !</button>'
      +'<button class="btn btn-gray" style="margin-top:8px" onclick="lBack()">← Retour</button>'
  }
  return'<div class="ls"><div style="width:100%;max-width:360px">'+c+'</div></div>'
}

window.lNext=function(){
  if(lstep===1){const v=document.getElementById('psi')?.value?.trim();if(!v||v.length<2){notify('Pseudo trop court','var(--red)');return}ld.pseudo=v}
  if(lstep===2&&!ld.archetype){notify('Choisis un archétype','var(--red)');return}
  lstep++;document.getElementById('app').innerHTML=lobbyHtml()
};
window.lBack=function(){lstep=Math.max(1,lstep-1);document.getElementById('app').innerHTML=lobbyHtml()};
window.lArch=function(k){ld.archetype=k;document.getElementById('app').innerHTML=lobbyHtml()};
window.lCol=function(key,c){ld[key]=c;document.getElementById('app').innerHTML=lobbyHtml()};
window.lAcc=function(a){ld.accessory=a;document.getElementById('app').innerHTML=lobbyHtml()};
window.lFinish=async function(){
  const pin=document.getElementById('pin-s')?.value;
  if(!pin||pin.length<4){notify('PIN trop court (4-6 chiffres)','var(--red)');return}
  savePin(pin);
  const isFirst=!Object.keys(DATA.players||{}).length;
  const player={pseudo:ld.pseudo,archetype:ld.archetype,color1:ld.color1,color2:ld.color2,accessory:ld.accessory,
    level:0,xp:0,gold:0,hasObject:false,
    skills:{search:{level:0,xp:0},steal:{level:0,xp:0},spy:{level:0,xp:0},talk:{level:0,xp:0}},
    pityCounts:{search:0,steal:0,spy:0,talk:0,negotiate:0},
    cooldowns:{},currentZone:null,isAdmin:isFirst,joinedAt:Date.now()};
  await fbSet('/players/'+myId,player);
  addEv('info',ld.pseudo+' rejoint la partie !',myId);
  creating=false
};

      +'<div style="font-size:20px;min-width:28px">'+(['🥇','🥈','🥉'][i]||'#'+(i+1))+'</div>'
      +'<div class="av" style="background:'+(p.color1||'#404060')+';border-color:'+(ARCHETYPES[p.archetype]?.col||'var(--border)')+'">'+( ARCHETYPES[p.archetype]?.icon||'?')+'</div>'
      +'<div style="flex:1"><div style="font-weight:800;font-size:13px">'+p.pseudo+'</div><div style="font-size:11px;color:var(--gray)">Niv.'+(p.level||0)+' · '+playerTitle(p)+'</div></div>'
      +'<div style="font-weight:800;color:var(--gold)">'+(p.gold||0)+' 🪙</div></div>').join('')+'</div>'
    +(isAdmin()?'<button class="btn btn-red" onclick="resetGame()">🔄 Nouvelle partie</button>':'')+'</div>'
}
window.resetGame=async function(){
  showModal('<div style="text-align:center;margin-bottom:16px;font-weight:800">Réinitialiser la partie ?</div>'
    +'<button class="btn btn-red" style="margin-bottom:8px" onclick="doReset()">Oui, réinitialiser</button>'
    +'<button class="btn btn-gray" onclick="closeModal()">Annuler</button>')
};
window.doReset=async function(){
  closeModal();
  const keptPlayers=Object.fromEntries(Object.entries(DATA.players||{}).map(([id,p])=>[id,{...p,gold:0,hasObject:false,level:0,xp:0,skills:{search:{level:0,xp:0},steal:{level:0,xp:0},spy:{level:0,xp:0},talk:{level:0,xp:0}},pityCounts:{search:0,steal:0,spy:0,talk:0,negotiate:0},cooldowns:{},currentZone:null}]));
  await DB.ref('/').set({...DEF,players:keptPlayers});
  notify('Partie réinitialisée !','var(--green)')
};

// ══ MODAL ══
function showModal(html){
  closeModal();
  const bd=document.createElement('div');bd.className='mb';
  bd.innerHTML='<div class="mo">'+html+'</div>';
  bd.addEventListener('click',e=>{if(e.target===bd)closeModal()});
  document.body.appendChild(bd)
}
function closeModal(){document.querySelector('.mb')?.remove()}
window.closeModal=closeModal;

function showDice(roll,text){
  const col=roll.result.includes('fail')?'var(--red)':roll.result==='critical'?'var(--gold)':'var(--green)';
  showModal('<div class="dr"><div style="font-size:12px;color:var(--gray)">🎲 1d20</div>'
    +'<div class="dn" style="color:'+col+'">'+roll.modified+'</div>'
    +(roll.raw!==roll.modified?'<div style="font-size:10px;color:var(--gray)">(brut: '+roll.raw+')</div>':'')
    +'<div class="dl '+roll.result+'">'+RLBL[roll.result]+'</div>'
    +'<div style="margin:12px 0;font-size:13px;line-height:1.6;white-space:pre-line">'+text+'</div>'
    +'<div style="font-size:11px;color:var(--blue)">+'+roll.xp+' XP</div></div>'
    +'<button class="btn btn-gray" onclick="closeModal()">OK</button>')
}

// ══ TIMER ══
function startTimer(){
  clearInterval(timerIv);
  timerIv=setInterval(()=>{
    const el=document.getElementById('tv');
    if(el){
      el.textContent=timerStr();
      const r=DATA?.game?.timerEnd?DATA.game.timerEnd-Date.now():Infinity;
      el.classList.toggle('warn',r<120000)
    }
    if(isAdmin()&&DATA?.game?.timerEnd&&Date.now()>=DATA.game.timerEnd)checkVictory()
  },1000)
}

// ══ INIT ══
if('serviceWorker' in navigator)navigator.serviceWorker.register('./sw.js').catch(()=>{});
initFB();
</script>
